<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CONSISTENCY">
<title>∞</title>
<link rel="manifest" href="#" id="manifest-placeholder">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0A;
  --surf: #141414;
  --surf2: #1C1C1C;
  --line: #2A2A2A;
  --line2: #333;
  --text: #F0EDE8;
  --muted: #666;
  --muted2: #888;
  --accent: #F0EDE8;
  --r: 4px;
  --r2: 8px;
  --font: 'Cormorant Garamond', serif;
  --mono: 'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 130px;
  text-transform: uppercase;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); }

/* ── HEADER ── */
.top { padding: 52px 22px 0; }
.brand {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
}
.brand-left {}
.brand-name {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: .02em;
  line-height: 1;
  color: var(--text);
  opacity: .75;
}
.brand-sub { display: none; }

/* WORKOUT TIMER (session) */
.brand-timer {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.st-play {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--line2);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
  opacity: .5;
}
.st-play.running { border-color: var(--text); background: var(--text); color: var(--bg); opacity: 1; }
.st-val {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: .18em;
  color: var(--text);
  opacity: .5;
}
.brand-timer.running .st-val { opacity: 1; }

/* PAGE NAV */
.page-nav {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.pn {
  flex: 1;
  padding: 12px 0 10px;
  text-align: center;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: .18em;
  color: var(--muted);
  cursor: pointer;
  transition: color .2s;
  text-transform: uppercase;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
}
.pn.active { color: var(--text); border-bottom-color: var(--text); }

/* ── DAY TABS ── */
.day-tabs { display: flex; gap: 5px; margin-bottom: 18px; }
.dt {
  flex: 1;
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 4px 7px;
  text-align: center;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.dt.active {
  background: var(--text);
  border-color: var(--text);
}
.dt-dot { display: none; }
.dt-vol { display: none; }
.dt-label {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .02em;
  display: block;
  color: var(--text);
  text-transform: uppercase;
}
.dt.active .dt-label { color: var(--bg); }
.dt-edit {
  display: none;
  font-family: var(--mono);
  font-size: 14px;
  background: none;
  border: none;
  color: rgba(10,10,10,.6);
  cursor: pointer;
  padding: 0;
  margin-top: 2px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: .05em;
}
.dt.active .dt-edit { display: block; }
body.light .dt.active .dt-edit { color: rgba(240,237,232,.8); }
.dt-add {
  flex: 0 0 32px !important;
  padding: 8px 4px !important;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── EXERCISE LIST ── */
.tbl-wrap {
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  overflow: hidden;
}
.ex-block { border-bottom: 1px solid var(--line); }
.ex-block:last-of-type { border-bottom: none; }

.ex-name-row {
  display: flex;
  align-items: center;
  padding: 14px 16px 14px 10px;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.ex-name-row:active { background: var(--surf2); }

.ex-main { flex: 1; min-width: 0; }
.en {
  font-size: 15px;
  font-weight: 400;
  
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.01em;
  line-height: 1.2;
}
.ex-last { font-family: var(--mono); font-size: 7.5px; color: var(--muted); margin-top: 3px; }

.ex-name-row.done-all .en { text-decoration: line-through; text-decoration-color: var(--muted); opacity: .3; }
.ex-name-row.done-all .ex-last { display: none; }
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.set-progress { font-family: var(--mono); font-size: 10px; min-width: 26px; text-align: right; transition: color .2s; }
.chevron { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--muted2); transition: transform .25s cubic-bezier(.4,0,.2,1); font-size: 12px; }
.chevron.open { transform: rotate(180deg); }

.ex-edit-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; gap: 3px; opacity: .8; }
.ex-edit-btn:active { background: var(--line); opacity: 1; }
.ex-edit-btn span { display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--text); }

/* Sets panel */
.sets-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .25s cubic-bezier(.4,0,.2,1); }
.sets-wrap.open { grid-template-rows: 1fr; }
.sets-inner { overflow: hidden; }
.sets-pad { padding: 2px 16px 12px; }
.set-row {
  display: grid;
  grid-template-columns: 18px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 5px 8px;
  border-radius: 6px;
  transition: background .2s;
}
.set-row.set-done { background: rgba(240,237,232,.04); }
.set-num { font-family: var(--mono); font-size: 8px; color: var(--muted); text-align: center; }
.set-info { font-family: var(--mono); font-size: 11px; color: var(--text); transition: all .2s; }
.set-info.done { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(240,237,232,.2); }
.set-wt { font-family: var(--mono); font-size: 10px; color: var(--muted2); transition: opacity .2s; }
.set-wt.done { opacity: .25; }
.set-prev { font-family: var(--mono); font-size: 8px; color: var(--muted); opacity: .5; margin-top: 2px; }
.set-check-wrap {
  position: relative;
  width: 36px; height: 36px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.set-check-arc {
  position: absolute;
  top: 0; left: 0;
  width: 36px; height: 36px;
  transform: rotate(-90deg);
  pointer-events: none;
}
.set-arc-bg {
  fill: none;
  stroke: var(--line2);
  stroke-width: 3;
  opacity: 0;
  transition: opacity .3s;
}
.set-arc-fill {
  fill: none;
  stroke: #C94040;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 87.96; /* 2π×14 */
  stroke-dashoffset: 87.96;
  transition: stroke-dashoffset 1s linear;
}
.set-check-wrap.resting .set-arc-bg { opacity: 1; }
/* Countdown label shown inside circle during rest */
.set-rest-count {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 700;
  color: #C94040;
  letter-spacing: -.02em;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
  z-index: 2;
}
.set-check-wrap.resting .set-rest-count { opacity: 1; }
.set-check-wrap.resting .set-check { opacity: 0; }
.set-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line2);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, background .2s, transform .2s;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.set-check.checked { border-color: var(--text); background: var(--text); }
.set-check svg { opacity: 0; transition: opacity .15s; }
.set-check.checked svg { opacity: 1; }

/* Rest duration edit */
.rest-dur-btn {
  font-family: var(--mono);
  font-size: 7.5px;
  letter-spacing: .06em;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: color .15s, background .15s;
  white-space: nowrap;
}
.rest-dur-btn:active { color: var(--text); background: var(--line); }
.rest-popover {
  display: none;
  position: absolute;
  right: 0; top: calc(100% + 6px);
  background: var(--surf2);
  border: 1px solid var(--line2);
  border-radius: 6px;
  padding: 8px;
  gap: 5px;
  flex-direction: column;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  min-width: 100px;
}
.rest-popover.open { display: flex; }
.rest-popover-label {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 0 2px 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 2px;
}
.rest-popover-opts { display: flex; gap: 4px; flex-wrap: wrap; }
.rp-opt {
  font-family: var(--mono);
  font-size: 8px;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 3px;
  padding: 5px 8px;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
}
.rp-opt.sel { border-color: var(--text); color: var(--text); }
.set-row-right {
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
}



/* Edit panel */
.edit-panel { padding: 6px 16px 14px; border-top: 1px solid var(--line); background: rgba(240,237,232,.02); }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.edit-grid label { font-family: var(--mono); font-size: 7.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; display: block; margin-bottom: 5px; }
.ie-input {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surf2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  outline: none;
  color: var(--text);
  padding: 9px 6px;
  width: 100%;
  text-align: center;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.ie-input:focus { border-color: var(--muted2); }
.kg-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.kg-wrap .ie-input,
.kg-wrap .field-input-inner {
  padding-right: 28px;
  width: 100%;
}
.kg-suffix {
  position: absolute;
  right: 8px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  pointer-events: none;
  letter-spacing: .06em;
}
.edit-btns { display: flex; gap: 8px; }
.eb { flex: 1; font-family: var(--mono); font-size: 8.5px; letter-spacing: .1em; padding: 11px; border-radius: var(--r); border: none; cursor: pointer; text-transform: uppercase; transition: opacity .15s; }
.eb:active { opacity: .7; }
.eb-save { background: var(--text); color: var(--bg); }
.eb-del { background: none; border: 1px solid var(--line); color: var(--muted); }

/* Delete confirm */
.del-confirm { display: flex; align-items: center; gap: 10px; padding: 13px 16px; background: rgba(255,60,60,.05); border-bottom: 1px solid rgba(255,60,60,.1); }
.del-txt { font-family: var(--mono); font-size: 10px; color: #C06060; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.del-btn { font-family: var(--mono); font-size: 8.5px; padding: 7px 13px; border-radius: var(--r); border: none; cursor: pointer; white-space: nowrap; letter-spacing: .06em; }
.del-no { background: var(--surf2); color: var(--muted); }
.del-yes { background: #C94040; color: white; }

/* Add row */
.ar {
  display: flex; align-items: center;
  padding: 14px 16px; cursor: pointer; gap: 12px;
  color: var(--muted); font-size: 13px;
  border-top: 1px solid var(--line);
  transition: background .15s, color .15s;
  font-family: var(--font); font-weight: 300;  letter-spacing: -.01em;
}
.ar:active { background: var(--surf2); color: var(--text); }
.ai { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--line2); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: var(--muted); font-family: var(--mono); line-height: 1; }

/* Footer stats */
.footer-stats {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 12px 0 4px;
  font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .06em;
}
.fs-dot { opacity: .2; }

/* Session complete banner */
.done-banner {
  display: none;
  border-radius: var(--r2);
  padding: 22px;
  margin-bottom: 14px;
  text-align: center;
  border: 1px solid var(--line);
  background: var(--surf);
}
.done-banner.show { display: block; animation: slideDown .3s cubic-bezier(.4,0,.2,1); }
.done-icon { font-size: 24px; margin-bottom: 10px; }
.done-title { font-family: var(--font); font-size: 22px; font-weight: 300;  margin-bottom: 4px; }
.done-sub { font-family: var(--mono); font-size: 8.5px; color: var(--muted); letter-spacing: .08em; }
.done-reset { margin-top: 16px; background: none; border: 1px solid var(--line); border-radius: var(--r); padding: 9px 18px; font-family: var(--mono); font-size: 8.5px; letter-spacing: .1em; color: var(--muted); cursor: pointer; transition: background .15s, color .15s; text-transform: uppercase; }
.done-reset:hover { background: var(--line); color: var(--text); }

/* ── HISTORY ── */
.hist-empty { text-align: center; padding: 70px 20px; color: var(--muted); font-size: 18px; font-family: var(--font);  line-height: 1.6; }
.hist-item { background: var(--surf); border: 1px solid var(--line); border-radius: var(--r2); overflow: hidden; margin-bottom: 10px; }
.hist-head { padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
.hist-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--text); }
.hist-info { flex: 1; }
.hist-day { font-family: var(--font); font-size: 16px; font-weight: 300;  }
.hist-date { font-family: var(--mono); font-size: 8px; color: var(--muted); margin-top: 2px; letter-spacing: .04em; }
.hist-meta { display: flex; align-items: center; gap: 8px; }
.hist-badge { font-family: var(--mono); font-size: 8.5px; color: var(--muted); background: var(--surf2); border-radius: var(--r); padding: 4px 9px; }
.hist-del { font-family: var(--mono); font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; line-height: 1; }
.hist-del:active { background: var(--line); }
.hist-exs { border-top: 1px solid var(--line); }
.hist-row { display: grid; grid-template-columns: 18px 1fr 30px 30px 56px; padding: 9px 18px; border-bottom: 1px solid var(--line); align-items: center; gap: 4px; }
.hist-row:last-child { border-bottom: none; }
.hc { font-family: var(--mono); font-size: 9.5px; color: var(--muted); }
.hc.nm { font-family: var(--font); font-size: 13px;  color: var(--text); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hc.r { text-align: center; }

/* ── PROGRESS PAGE ── */
.progress-page { padding: 0 22px; }
.prog-title { font-family: var(--font); font-size: 22px;  font-weight: 300; margin-bottom: 6px; }
.prog-sub { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 22px; }
.prog-select-wrap { margin-bottom: 20px; }
.prog-select-wrap label { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; display: block; margin-bottom: 7px; }
.prog-select {
  width: 100%;
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 11px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  
  font-weight: 300;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
}
.prog-empty { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--font); font-size: 16px;  }
.chart-wrap { background: var(--surf); border: 1px solid var(--line); border-radius: var(--r2); padding: 20px; margin-bottom: 14px; }
.chart-label { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 16px; }
.chart-canvas { width: 100%; height: 160px; position: relative; }
.chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--line); border-radius: var(--r); overflow: hidden; margin-top: 16px; }
.cs { background: var(--surf2); padding: 12px 14px; text-align: center; }
.cs-val { font-family: var(--mono); font-size: 16px; color: var(--text); letter-spacing: -.03em; }
.cs-label { font-family: var(--mono); font-size: 7.5px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }

/* ── FAB ── */
.fw {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  padding: 16px 22px 34px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
}
.fab {
  width: 100%;
  padding: 16px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .2em;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity .2s;
}
.fab:active { opacity: .82; }

/* ── ADD SHEET ── */
.ov {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,10,10,.82);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.ov.open { display: flex; }
.sh {
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: 16px 16px 0 0;
  padding: 26px 22px 44px;
  width: 100%;
  max-width: 480px;
  animation: sheetUp .28s cubic-bezier(.32,1,.4,1);
}
.shh { width: 30px; height: 2px; background: var(--line2); border-radius: 2px; margin: 0 auto 24px; }
.shl { font-family: var(--font); font-size: 22px; font-weight: 300;  color: var(--text); margin-bottom: 22px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; }
.field input, .field textarea {
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 13px 15px;
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 300;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: var(--muted2); }
.r3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.bsv {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--r);
  background: var(--text);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .18em;
  cursor: pointer;
  margin-top: 8px;
  text-transform: uppercase;
  transition: opacity .2s;
}
.bsv:active { opacity: .82; }

.hint { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .06em; text-align: center; padding: 8px 0 2px; opacity: .55; }
.hidden { display: none !important; }

/* ── DRAG & DROP ── */
.ex-block.dragging { opacity: .4; }
.ex-block.drag-over { border-top: 2px solid var(--text); }
.drag-num {
  cursor: grab;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border: 1px solid var(--line2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 7px;
  color: var(--muted);
  user-select: none;
  transition: border-color .15s, color .15s;
}
.drag-num:active { cursor: grabbing; border-color: var(--muted2); color: var(--text); }

/* ── ANIMATIONS ── */
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.3); }
  70%  { transform: scale(.93); }
  100% { transform: scale(1); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes sheetUp {
  from { transform: translateY(48px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.pop { animation: pop .3s cubic-bezier(.34,1.56,.64,1); }

/* ── INF TOGGLE ── */
.inf-toggle {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  margin-right: 6px;
  transition: opacity .2s;
  opacity: .85;
}
.inf-toggle:active { opacity: .5; }
.inf-knob {
  transition: cx .4s cubic-bezier(.4,0,.2,1);
}
body.light .inf-knob { cx: 33px; }

/* ── LIGHT MODE ── */
body.light {
  --bg: #F5F3EF;
  --surf: #EDEAE5;
  --surf2: #E4E1DC;
  --line: #D8D4CE;
  --line2: #C8C4BE;
  --text: #1A1816;
  --muted: #999490;
  --muted2: #777370;
}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="brand-left">
      <div class="brand-name">
        <button class="inf-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <svg width="44" height="22" viewBox="0 0 44 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="9.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="33" cy="11" r="9.5" stroke="currentColor" stroke-width="1.4"/>
            <circle class="inf-knob" cx="11" cy="11" r="5.5" fill="currentColor"/>
          </svg>
        </button>
        <span style="font-size:13px;letter-spacing:.18em;opacity:.5">CONSISTENCY</span>
      </div>
      <div class="brand-sub">Training Log</div>
    </div>
    <div class="brand-timer" onclick="toggleSessionTimer()">
        <button class="st-play" id="st-play">
          <svg id="st-icon" width="10" height="10" viewBox="0 0 12 12" fill="currentColor">
            <polygon points="2,1 11,6 2,11"/>
          </svg>
        </button>
        <span class="st-val" id="st-val">00:00</span>
      </div>
  </div>

  <div class="page-nav">
    <div class="pn active" onclick="setPage('workout')">Workout</div>
    <div class="pn" onclick="setPage('history')">History</div>
    <div class="pn" onclick="setPage('progress')">Progress</div>
  </div>
</div>

<!-- WORKOUT PAGE -->
<div id="page-workout" style="padding:0 22px">
  <div class="day-tabs" id="day-tabs"></div>

  <!-- SESSION COMPLETE -->
  <div id="done-banner" class="done-banner">
    <div class="done-icon">◆</div>
    <div class="done-title">Session complete</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="done-reset" onclick="resetSession()">Reset session</button>
  </div>

  <div class="tbl-wrap" id="tbl"></div>

  <div class="footer-stats">
    <span><span id="s-e">0</span> exercises</span>
    <span class="fs-dot">·</span>
    <span><span id="s-s">0</span> sets</span>
    <span class="fs-dot">·</span>
    <span id="s-vol">—</span>
  </div>
  <div class="hint">Tap to expand · ··· to edit · ☰ to reorder</div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="hidden" style="padding:0 22px">
  <div id="hist-list"></div>
</div>

<!-- PROGRESS PAGE -->
<div id="page-progress" class="hidden">
  <div class="progress-page">
    <div class="prog-select-wrap">
      <label>Select exercise</label>
      <select class="prog-select" id="prog-ex-select" onchange="renderProgress()">
        <option value="">— choose an exercise —</option>
      </select>
    </div>
    <div id="prog-content"></div>
  </div>
</div>

<div class="fw"><button class="fab" id="fab">+ Add exercise</button></div>

<!-- ADD SHEET -->
<div class="ov" id="ov" onclick="maybeClose(event)">
  <div class="sh">
    <div class="shh"></div>
    <div class="shl" id="shl">Add exercise</div>
    <div class="field"><label>Exercise name</label><input id="fn" type="text" placeholder="e.g. Bench Press" autocomplete="off" spellcheck="false"></div>
    <div class="r3">
      <div class="field"><label>Sets</label><input id="fs" type="number" min="1" max="20" placeholder="3" inputmode="numeric"></div>
      <div class="field"><label>Reps</label><input id="fr" type="number" min="1" max="100" placeholder="12" inputmode="numeric"></div>
      <div class="field"><label>Weight</label><div class="kg-wrap"><input id="fw2" type="number" inputmode="decimal" placeholder="0" spellcheck="false" style="font-family:var(--mono);font-size:15px;background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:13px 30px 13px 15px;color:var(--text);outline:none;width:100%;-webkit-appearance:none;transition:border-color .15s;"><span class="kg-suffix">KG</span></div></div>
    </div>
    <button class="bsv" id="bsv" onclick="saveEx()">Save</button>
  </div>
</div>

<!-- DAY EDIT SHEET -->
<div class="ov" id="ov-day" onclick="if(event.target===this)closeDaySheet()">
  <div class="sh">
    <div class="shh"></div>
    <div class="shl" id="day-sheet-title">Edit Day</div>
    <div class="field"><label>Day name</label><input id="day-name-input" type="text" placeholder="e.g. Shoulders" autocomplete="off" spellcheck="false"></div>
    <button class="bsv" id="day-save-btn" onclick="saveDay()">Save</button>
    <button id="day-del-btn" onclick="deleteDay()" style="width:100%;margin-top:10px;padding:13px;background:none;border:1px solid var(--line);border-radius:var(--r);font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:#C06060;cursor:pointer;text-transform:uppercase;">Delete Day</button>
  </div>
</div>

<script>
// ── THEME ──
const savedTheme = localStorage.getItem('kis8_theme') || 'dark';
if (savedTheme === 'light') document.body.classList.add('light');

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('kis8_theme', isLight ? 'light' : 'dark');
}

const DEF_CFG = [
  { label: 'Chest' },
  { label: 'Back'  },
  { label: 'Legs'  }
];
let CFG = JSON.parse(localStorage.getItem('kis8_cfg')||'null') || DEF_CFG.map(c=>({...c, color:'#F0EDE8'}));
const DEF = [
  [
    {id:1,name:'Incline Bench Press',sets:3,reps:12,weight:'25KG'},
    {id:2,name:'Machine Chest Fly',sets:3,reps:12,weight:'45KG'},
    {id:3,name:'Barbell Overhead Press',sets:3,reps:12,weight:'30KG'},
    {id:4,name:'DB Lateral Raises',sets:3,reps:12,weight:'6KG'},
    {id:5,name:'Triceps Push Down',sets:3,reps:12,weight:'36KG'}
  ],
  [
    {id:1,name:'Supinated Lat Pulldown',sets:3,reps:12,weight:'40KG'},
    {id:2,name:'Pronated Cable Row',sets:3,reps:12,weight:'36KG'},
    {id:3,name:'Biceps Curls',sets:3,reps:12,weight:'12KG'},
    {id:4,name:'Rope Trap Shrug',sets:3,reps:15,weight:'40KG'},
    {id:5,name:'Hyperextensions',sets:3,reps:15,weight:'BW'}
  ],
  [
    {id:1,name:'Barbell Back Squat',sets:3,reps:8,weight:'70KG'},
    {id:2,name:'Deadlift',sets:3,reps:8,weight:'70KG'},
    {id:3,name:'Standing Calf Raise',sets:3,reps:20,weight:'150KG'},
    {id:4,name:'Incline Bench Press',sets:3,reps:12,weight:'25KG'},
    {id:5,name:'Machine Chest Fly',sets:3,reps:12,weight:'45KG'}
  ]
];

let data      = JSON.parse(localStorage.getItem('kis8_data')||'null') || DEF.map(d=>d.map(e=>({...e})));
let setsDone  = JSON.parse(localStorage.getItem('kis8_sets')||'null');
let history   = JSON.parse(localStorage.getItem('kis8_hist')||'[]');
let notes     = {};
let activeDay = 0, ctx = null, editingEx = null, deleteConfirm = null;
let expanded  = new Set();

// ── SESSION TIMER ──
let sessionStart = null, sessionTick = null, sessionActive = false;

function startSessionTimer() {
  if (sessionActive) return;
  sessionActive = true;
  sessionStart = Date.now();
  sessionTick = setInterval(updateSessionUI, 1000);
  updateSessionUI();
  updatePlayBtn();
}
function stopSessionTimer() {
  sessionActive = false;
  clearInterval(sessionTick); sessionTick = null;
  document.getElementById('st-val').textContent = '00:00';
  updatePlayBtn();
}
function toggleSessionTimer() {
  if (sessionActive) stopSessionTimer();
  else startSessionTimer();
}
function updateSessionUI() {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('st-val').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updatePlayBtn() {
  const btn = document.getElementById('st-play');
  const icon = document.getElementById('st-icon');
  const timer = btn?.closest('.brand-timer');
  if (!btn || !icon) return;
  if (sessionActive) {
    btn.classList.add('running');
    if (timer) timer.classList.add('running');
    icon.innerHTML = '<rect x="2" y="1" width="3" height="10"/><rect x="7" y="1" width="3" height="10"/>';
  } else {
    btn.classList.remove('running');
    if (timer) timer.classList.remove('running');
    icon.innerHTML = '<polygon points="2,1 11,6 2,11"/>';
  }
}

// ── REST TIMER (inline, per exercise) ──
let restDur = 120, restRemain = 0, restTick = null, restExKey = null, restSetIdx = null;

function fmtRestDur(s) {
  return s + 's';
}

function setRestDur(s, popId) {
  restDur = s;
  if (restTick) { restRemain = s; updateRestUI(); }
  const durMap = {60:'60s', 120:'120s'};
  document.querySelectorAll('.rp-opt').forEach(b => {
    b.classList.toggle('sel', b.textContent.trim() === durMap[s]);
  });
  document.querySelectorAll('.rest-dur-btn').forEach(b => b.textContent = '···');
  if (popId) closeRestPopover(popId);
}

function toggleRestPopover(e, id) {
  e.stopPropagation();
  const pop = document.getElementById(id);
  if (!pop) return;
  const isOpen = pop.classList.contains('open');
  document.querySelectorAll('.rest-popover.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) pop.classList.add('open');
}
function closeRestPopover(id) {
  const pop = document.getElementById(id);
  if (pop) pop.classList.remove('open');
}
document.addEventListener('click', e => {
  // Close rest popovers
  document.querySelectorAll('.rest-popover.open').forEach(p => p.classList.remove('open'));
  // Save inline edit if clicked outside table
  if (editingEx) {
    const tbl = document.getElementById('tbl');
    if (tbl && !tbl.contains(e.target)) saveInlineEdit();
  }
});

function startRest(di, ei, si) {
  stopRest(true);
  restExKey = `${di}-${ei}`;
  restSetIdx = si;
  restRemain = restDur;
  updateRestUI();
  restTick = setInterval(() => {
    restRemain--;
    updateRestUI();
    if (restRemain <= 0) {
      stopRest();
      try { navigator.vibrate && navigator.vibrate([120,60,120]); } catch(e) {}
    }
  }, 1000);
}

function stopRest(silent) {
  clearInterval(restTick); restTick = null;
  if (restExKey) {
    const si = restSetIdx;
    const wrap = document.getElementById(`scw-${restExKey}-${si}`);
    const arc = document.getElementById(`arc-${restExKey}-${si}`);
    const cnt = document.getElementById(`cnt-${restExKey}-${si}`);
    if (wrap) wrap.classList.remove('resting');
    if (arc) arc.style.strokeDashoffset = 87.96;
    if (cnt) cnt.textContent = '';
  }
  document.querySelectorAll('.rest-dur-btn').forEach(b => b.textContent = '···');
  restExKey = null;
  restSetIdx = null;
}

function updateRestUI() {
  if (!restExKey) return;
  const CIRC = 87.96;
  const pct = Math.max(0, restRemain) / restDur;
  const offset = CIRC * (1 - pct);
  const m = Math.floor(Math.max(0, restRemain) / 60);
  const s = Math.max(0, restRemain) % 60;
  const timeStr = String(Math.max(0, restRemain));
  const [di, ei] = restExKey.split('-').map(Number);
  const si = restSetIdx;
  const wrap = document.getElementById(`scw-${di}-${ei}-${si}`);
  const arc = document.getElementById(`arc-${di}-${ei}-${si}`);
  const cnt = document.getElementById(`cnt-${di}-${ei}-${si}`);
  if (wrap) wrap.classList.add('resting');
  if (arc) arc.style.strokeDashoffset = offset;
  if (cnt) cnt.textContent = timeStr;
}

// ── DATA ──
function syncSets() {
  if (!setsDone) setsDone = [];
  data.forEach((day, di) => {
    if (!setsDone[di]) setsDone[di] = [];
    day.forEach((ex, ei) => {
      if (!setsDone[di][ei] || setsDone[di][ei].length !== ex.sets) {
        const prev = setsDone[di][ei] || [];
        setsDone[di][ei] = Array.from({length: ex.sets}, (_,i) => prev[i] || false);
      }
    });
  });
}
syncSets();

function persist() {
  localStorage.setItem('kis8_data', JSON.stringify(data));
  localStorage.setItem('kis8_sets', JSON.stringify(setsDone));
  localStorage.setItem('kis8_hist', JSON.stringify(history));
  localStorage.setItem('kis8_cfg',  JSON.stringify(CFG));
}

function isExDone(di, ei) {
  return (setsDone[di]?.[ei] || []).every(Boolean) && (setsDone[di]?.[ei]?.length || 0) > 0;
}
function isAllDone(di) {
  return data[di].length > 0 && data[di].every((_, ei) => isExDone(di, ei));
}

function dayKey(d) {
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function lastFor(di, name) {
  for (const h of history) {
    if (h.day === CFG[di].label) {
      const ex = (h.exercises||[]).find(e => e.name === name);
      if (ex) return `${ex.sets}×${ex.reps} · ${ex.weight}`;
    }
  }
  return null;
}

function lastExData(di, name) {
  for (const h of history) {
    if (h.day === CFG[di].label) {
      const ex = (h.exercises||[]).find(e => e.name === name);
      if (ex) return { reps: ex.reps, weight: ex.weight };
    }
  }
  return null;
}

function calcVol(di) {
  return data[di].reduce((sum, ex) => {
    const kg = parseFloat(ex.weight);
    return isNaN(kg) ? sum : sum + kg * ex.sets * ex.reps;
  }, 0);
}
function fmtVol(v) { return v >= 1000 ? (v/1000).toFixed(1)+'t' : Math.round(v)+'kg'; }

// ── PAGE ──
function setPage(p) {
  document.querySelectorAll('.pn').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase() === p));
  document.getElementById('page-workout').classList.toggle('hidden', p !== 'workout');
  document.getElementById('page-history').classList.toggle('hidden', p !== 'history');
  document.getElementById('page-progress').classList.toggle('hidden', p !== 'progress');
  document.getElementById('fab').style.display = p === 'workout' ? '' : 'none';
  if (p === 'history') renderHistory();
  if (p === 'progress') initProgress();
}

// ── FOOTER ──
function updateFooter() {
  const di = activeDay;
  document.getElementById('s-e').textContent = data[di].length;
  document.getElementById('s-s').textContent = data[di].reduce((s,e) => s + e.sets, 0);
  const vol = calcVol(di);
  document.getElementById('s-vol').textContent = vol > 0 ? fmtVol(vol) + ' vol' : '—';
}

// ── TABS ──
function renderTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  data.forEach((_, di) => {
    const cfg = CFG[di], active = di === activeDay, done = isAllDone(di);
    const vol = calcVol(di);
    const el = document.createElement('div');
    el.className = 'dt' + (active ? ' active' : '') + (done && !active ? ' done' : '');
    el.innerHTML = `
      <div class="dt-dot"></div>
      <span class="dt-label">${cfg.label}</span>
      ${vol > 0 ? `<span class="dt-vol">${fmtVol(vol)}</span>` : ''}
      <button class="dt-edit" onclick="openDayEdit(event,${di})">···</button>`;
    el.onclick = (e) => {
      if (e.target.closest('.dt-edit')) return;
      saveInlineEdit(); activeDay = di; editingEx = null; deleteConfirm = null; expanded.clear(); render();
    };
    c.appendChild(el);
  });
  // Add day button
  const add = document.createElement('div');
  add.className = 'dt dt-add';
  add.innerHTML = `<span style="font-size:16px;line-height:1;color:var(--muted)">+</span>`;
  add.onclick = () => openDayAdd();
  c.appendChild(add);
}

// ── TABLE ──
function renderTable() {
  const di = activeDay, exs = data[di];
  const allDone = isAllDone(di);
  document.getElementById('done-banner').classList.toggle('show', allDone);
  if (allDone) document.getElementById('done-sub').textContent = exs.length + ' exercises · ' + CFG[di].label;

  let html = '';
  exs.forEach((ex, ei) => {
    const exDone = isExDone(di, ei);
    const isEd = editingEx && editingEx.di === di && editingEx.ei === ei;
    const isDel = deleteConfirm && deleteConfirm.di === di && deleteConfirm.ei === ei;
    const sArr = setsDone[di]?.[ei] || [];
    const isExp = expanded.has(`${di}-${ei}`);
    const doneCount = sArr.filter(Boolean).length;
    const inProg = doneCount > 0 && !exDone;
    const progressTxt = exDone ? '✓' : doneCount > 0 ? `${doneCount}/${ex.sets}` : `${ex.sets}×`;
    const progressColor = exDone ? 'var(--text)' : inProg ? 'var(--muted2)' : 'var(--muted)';
    const last = lastFor(di, ex.name);
    if (isDel) {
      html += `<div class="ex-block"><div class="del-confirm">
        <span class="del-txt">Delete "${escHtml(ex.name)}"?</span>
        <button class="del-btn del-no" onclick="cancelDelete()">Cancel</button>
        <button class="del-btn del-yes" onclick="confirmDelete(${di},${ei})">Delete</button>
      </div></div>`;
      return;
    }

    html += `<div class="ex-block" id="exb-${di}-${ei}" draggable="true" ondragstart="dragStart(event,${di},${ei})" ondragover="dragOver(event,${di},${ei})" ondrop="dragDrop(event,${di},${ei})" ondragend="dragEnd(event)">`;

    if (isEd) {
      html += `
        <div class="ex-name-row" style="cursor:default;border-left:2px solid var(--text);padding-left:14px">
          <div class="ei">${String(ei+1).padStart(2,'0')}</div>
          <div class="ex-main"><div class="en">${escHtml(ex.name)}</div></div>
        </div>
        <div class="edit-panel">
          <div class="edit-grid">
            <div><label>Sets</label><input class="ie-input" id="ie-sets" type="number" min="1" max="20" value="${ex.sets}" inputmode="numeric"></div>
            <div><label>Reps</label><input class="ie-input" id="ie-reps" type="number" min="1" max="100" value="${ex.reps}" inputmode="numeric"></div>
            <div><label>Weight</label><div class="kg-wrap"><input class="ie-input" id="ie-weight" type="number" inputmode="decimal" value="${parseFloat(ex.weight)||''}" spellcheck="false"><span class="kg-suffix">KG</span></div></div>
          </div>
          <div class="edit-btns">
            <button class="eb eb-save" onclick="saveInlineEdit()">Save</button>
            <button class="eb eb-del" onclick="askDelete(${di},${ei})">Delete</button>
          </div>
        </div>`;
    } else {
      html += `
        <div class="ex-name-row${exDone ? ' done-all' : ''}" onclick="toggleExpand(${di},${ei})">
          <div class="drag-num" onclick="event.stopPropagation()">${String(ei+1).padStart(2,'0')}</div>
          <div class="ex-main">
            <div class="en">${escHtml(ex.name)}</div>
            ${last && !exDone && isExp ? `<div class="ex-last">prev: ${last}</div>` : ''}
          </div>
          <div class="ex-right">
            <div class="chevron${isExp ? ' open' : ''}">▾</div>
            <button class="ex-edit-btn" onclick="startEdit(${di},${ei},event)"><span></span><span></span><span></span></button>
          </div>
        </div>
        <div class="sets-wrap${isExp ? ' open' : ''}">
          <div class="sets-inner"><div class="sets-pad">`;

      const prevEx = lastExData(di, ex.name);
      for (let si = 0; si < ex.sets; si++) {
        const done = sArr[si] || false;
        const isThisResting = restExKey === `${di}-${ei}` && restTick !== null && restSetIdx === si;
        const CIRC = 87.96;
        const arcOffset = isThisResting ? (CIRC * (1 - Math.max(0, restRemain) / restDur)) : CIRC;
        html += `<div class="set-row${done ? ' set-done' : ''}">
          <span class="set-num">${si+1}</span>
          <span class="set-info${done ? ' done' : ''}">${ex.reps} reps</span>
          <span class="set-wt${done ? ' done' : ''}">${escHtml(ex.weight)}</span>
          <div class="set-row-right">
            <button class="rest-dur-btn" onclick="toggleRestPopover(event,'rp-${di}-${ei}')">···</button>
            <div class="rest-popover" id="rp-${di}-${ei}">
              <div class="rest-popover-label">Rest duration</div>
              <div class="rest-popover-opts">
                <button class="rp-opt${restDur===60?' sel':''}" onclick="setRestDur(60,'rp-${di}-${ei}')">60s</button>
                <button class="rp-opt${restDur===120?' sel':''}" onclick="setRestDur(120,'rp-${di}-${ei}')">120s</button>
              </div>
            </div>
            <div class="set-check-wrap${isThisResting && done ? ' resting' : ''}" id="scw-${di}-${ei}-${si}">
              <svg class="set-check-arc" viewBox="0 0 36 36">
                <circle class="set-arc-bg" cx="18" cy="18" r="14"/>
                <circle class="set-arc-fill" id="arc-${di}-${ei}-${si}" cx="18" cy="18" r="14"
                  style="stroke-dashoffset:${arcOffset}"/>
              </svg>
              <div class="set-rest-count" id="cnt-${di}-${ei}-${si}"></div>
              <button class="set-check${done ? ' checked' : ''}" id="sc-${di}-${ei}-${si}"
                onclick="toggleSet(event,${di},${ei},${si})">

                  <path d="M1 3.8L3.8 7L9 1" stroke="var(--bg)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </div>`;
      }

      html += `</div></div></div>`;
    }

    html += `</div>`;
  });

  html += `<div class="ar" onclick="doAdd(${di})"><div class="ai">+</div><span>Add exercise</span></div>`;
  document.getElementById('tbl').innerHTML = html;

  if (isEd_active(di)) {
    const inp = document.getElementById('ie-sets');
    if (inp) { inp.focus(); inp.select(); }
    ['ie-sets','ie-reps','ie-weight'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('keydown', e => { if (e.key === 'Enter') saveInlineEdit(); });
        el.addEventListener('click', e => e.stopPropagation());
      }
    });
  }
}

let dragSrc = null;
function dragStart(e, di, ei) {
  dragSrc = { di, ei };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.ex-block').classList.add('dragging'), 0);
}
function dragOver(e, di, ei) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.ex-block').forEach(b => b.classList.remove('drag-over'));
  if (!dragSrc || (dragSrc.di === di && dragSrc.ei === ei)) return;
  e.target.closest('.ex-block')?.classList.add('drag-over');
}
function dragDrop(e, di, ei) {
  e.preventDefault();
  if (!dragSrc || dragSrc.di !== di || dragSrc.ei === ei) { dragEnd(e); return; }
  const src = dragSrc.ei, dst = ei;
  const [ex] = data[di].splice(src, 1);
  data[di].splice(dst, 0, ex);
  const [sd] = setsDone[di].splice(src, 1);
  setsDone[di].splice(dst, 0, sd);
  // Re-key notes
  const newNotes = {...notes};
  data[di].forEach((ex2, i) => {
    const oldKey = `${di}-${src}-${ex2.id}`;
    const newKey = `${di}-${i}-${ex2.id}`;
    if (notes[oldKey] !== undefined) { newNotes[newKey] = notes[oldKey]; delete newNotes[oldKey]; }
  });
  notes = newNotes;
  dragSrc = null;
  persist(); render();
}
function dragEnd(e) {
  document.querySelectorAll('.ex-block').forEach(b => { b.classList.remove('dragging'); b.classList.remove('drag-over'); });
  dragSrc = null;
}

// ── ACTIONS ──
function toggleExpand(di, ei) {
  if (editingEx) return;
  const key = `${di}-${ei}`;
  expanded.has(key) ? expanded.delete(key) : expanded.add(key);
  renderTable();
}

function toggleSet(e, di, ei, si) {
  e.stopPropagation();
  if (editingEx) saveInlineEdit();
  const wasChecked = setsDone[di][ei][si];
  setsDone[di][ei][si] = !wasChecked;
  if (!wasChecked) {
    expanded.add(`${di}-${ei}`);
    startRest(di, ei, si);
    if (!sessionActive) startSessionTimer();
  } else {
    // Only stop rest if it's this exact set that's resting
    if (restExKey === `${di}-${ei}` && restSetIdx === si) stopRest();
  }
  if (isAllDone(di)) saveToHistory(di);
  persist(); render();
  // Re-apply resting state after render (render rebuilds DOM)
  if (!wasChecked && restExKey === `${di}-${ei}` && restSetIdx === si) {
    updateRestUI();
  }
  requestAnimationFrame(() => {
    const btn = document.getElementById(`sc-${di}-${ei}-${si}`);
    if (btn && !wasChecked) { btn.classList.add('pop'); setTimeout(() => btn.classList.remove('pop'), 300); }
  });
}

function startEdit(di, ei, e) {
  if (e) e.stopPropagation();
  if (editingEx && (editingEx.di !== di || editingEx.ei !== ei)) saveInlineEdit();
  expanded.add(`${di}-${ei}`);
  deleteConfirm = null; editingEx = { di, ei }; renderTable();
}
function saveInlineEdit() {
  if (!editingEx) return;
  const { di, ei } = editingEx;
  const s = parseInt(document.getElementById('ie-sets')?.value) || data[di][ei].sets;
  const r = parseInt(document.getElementById('ie-reps')?.value) || data[di][ei].reps;
  const rawW = document.getElementById('ie-weight')?.value.trim();
  const w = rawW && !isNaN(parseFloat(rawW)) ? parseFloat(rawW) + 'KG' : (data[di][ei].weight || 'BW');
  data[di][ei] = { ...data[di][ei], sets:s, reps:r, weight:w };
  syncSets(); persist();
  editingEx = null; render();
}
function askDelete(di, ei) { saveInlineEdit(); editingEx = null; deleteConfirm = { di, ei }; renderTable(); }
function cancelDelete() { deleteConfirm = null; renderTable(); }
function confirmDelete(di, ei) {
  if (restExKey === `${di}-${ei}`) stopRest();
  data[di].splice(ei, 1); setsDone[di].splice(ei, 1);
  expanded.delete(`${di}-${ei}`);
  deleteConfirm = null; persist(); render();
}

function saveToHistory(di) {
  const cfg = CFG[di], now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  const dk = dayKey(now);
  if (history.length && history[0].day === cfg.label && history[0].dk === dk) return;
  history.unshift({ day: cfg.label, date: dateStr, dk, ts: now.getTime(), exercises: data[di].map(e => ({...e})) });
  if (history.length > 60) history = history.slice(0, 60);
  persist();
}
function resetSession() {
  setsDone[activeDay] = data[activeDay].map(e => Array(e.sets).fill(false));
  expanded.clear(); stopRest(); persist(); render();
}

// ── PROGRESS ──
function initProgress() {
  const sel = document.getElementById('prog-ex-select');
  const prev = sel.value;
  // Collect all unique exercise names from history
  const nameSet = new Set();
  history.forEach(h => (h.exercises||[]).forEach(e => nameSet.add(e.name)));
  // Also add current exercises
  data.forEach(day => day.forEach(e => nameSet.add(e.name)));
  const names = Array.from(nameSet).sort();
  sel.innerHTML = '<option value="">— choose an exercise —</option>' +
    names.map(n => `<option value="${escHtml(n)}"${n === prev ? ' selected':''} >${escHtml(n)}</option>`).join('');
  renderProgress();
}

function renderProgress() {
  const sel = document.getElementById('prog-ex-select');
  const name = sel.value;
  const c = document.getElementById('prog-content');
  if (!name) { c.innerHTML = '<div class="prog-empty">Select an exercise to view progress.</div>'; return; }

  // Gather data points from history (oldest first)
  const pts = [];
  for (let i = history.length - 1; i >= 0; i--) {
    const h = history[i];
    const ex = (h.exercises||[]).find(e => e.name === name);
    if (ex) {
      const kg = parseFloat(ex.weight);
      pts.push({ date: h.date.replace(/\w+, /,''), weight: isNaN(kg) ? 0 : kg, sets: ex.sets, reps: ex.reps, raw: ex.weight });
    }
  }
  if (!pts.length) {
    c.innerHTML = '<div class="prog-empty">No history found for this exercise yet.</div>';
    return;
  }

  const max = Math.max(...pts.map(p => p.weight));
  const min = Math.min(...pts.map(p => p.weight));
  const range = max - min || 1;
  const W = 400, H = 120, padX = 10, padY = 14;
  const plotW = W - padX * 2, plotH = H - padY * 2;

  const xStep = pts.length > 1 ? plotW / (pts.length - 1) : plotW;
  const points = pts.map((p, i) => ({
    x: padX + (pts.length > 1 ? i * xStep : plotW / 2),
    y: padY + plotH - ((p.weight - min) / range) * plotH,
    ...p
  }));

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(padY+plotH).toFixed(1)} L${points[0].x.toFixed(1)},${(padY+plotH).toFixed(1)} Z`;

  const last = pts[pts.length - 1];
  const first = pts[0];
  const diff = last.weight - first.weight;
  const diffStr = diff === 0 ? '—' : (diff > 0 ? '+' : '') + diff.toFixed(1) + 'kg';

  c.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-label">${escHtml(name)} — Weight over time</div>
      <div class="chart-canvas">
        <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="overflow:visible">
          <defs>
            <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#F0EDE8" stop-opacity=".12"/>
              <stop offset="100%" stop-color="#F0EDE8" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaD}" fill="url(#ag)"/>
          <path d="${pathD}" fill="none" stroke="#F0EDE8" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
          ${points.map((p, i) => `
            <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i === points.length-1 ? 3.5 : 2}" fill="${i === points.length-1 ? '#F0EDE8' : '#444'}" stroke="${i === points.length-1 ? '#0A0A0A' : 'none'}" stroke-width="1.5"/>
          `).join('')}
        </svg>
      </div>
      <div class="chart-stats">
        <div class="cs"><div class="cs-val">${last.raw}</div><div class="cs-label">Current</div></div>
        <div class="cs"><div class="cs-val">${max > 0 ? max + 'kg' : '—'}</div><div class="cs-label">Best</div></div>
        <div class="cs"><div class="cs-val">${diffStr}</div><div class="cs-label">Progress</div></div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;letter-spacing:.08em">${pts.length} session${pts.length!==1?'s':''} tracked</div>
  `;
}

// ── ADD ──
function doAdd(di) {
  saveInlineEdit(); ctx = { di };
  document.getElementById('shl').textContent = 'Add to ' + CFG[di].label;
  ['fn','fs','fr','fw2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fs').value = '3';
  document.getElementById('fr').value = '12';
  document.getElementById('ov').classList.add('open');
  setTimeout(() => document.getElementById('fn').focus(), 300);
}
function saveEx() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { document.getElementById('fn').focus(); return; }
  const sets = parseInt(document.getElementById('fs').value) || 3;
  const reps = parseInt(document.getElementById('fr').value) || 12;
  const rawW = document.getElementById('fw2').value.trim();
  const weight = rawW && !isNaN(parseFloat(rawW)) ? parseFloat(rawW) + 'KG' : 'BW';
  const { di } = ctx;
  const id = data[di].length ? Math.max(...data[di].map(e => e.id)) + 1 : 1;
  data[di].push({ id, name, sets, reps, weight });
  const newEi = data[di].length - 1;
  expanded.add(`${di}-${newEi}`);
  syncSets();
  document.getElementById('ov').classList.remove('open');
  persist(); render();
}
function maybeClose(e) { if (e.target === document.getElementById('ov')) document.getElementById('ov').classList.remove('open'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DAY MANAGEMENT ──
let dayCtx = null; // { mode: 'edit'|'add', di }

function openDayEdit(e, di) {
  e.stopPropagation();
  dayCtx = { mode: 'edit', di };
  document.getElementById('day-sheet-title').textContent = 'Edit Day';
  document.getElementById('day-name-input').value = CFG[di].label;
  document.getElementById('day-del-btn').style.display = data.length > 1 ? '' : 'none';
  document.getElementById('ov-day').classList.add('open');
  setTimeout(() => document.getElementById('day-name-input').focus(), 300);
}

function openDayAdd() {
  dayCtx = { mode: 'add' };
  document.getElementById('day-sheet-title').textContent = 'Add Day';
  document.getElementById('day-name-input').value = '';
  document.getElementById('day-del-btn').style.display = 'none';
  document.getElementById('ov-day').classList.add('open');
  setTimeout(() => document.getElementById('day-name-input').focus(), 300);
}

function closeDaySheet() {
  document.getElementById('ov-day').classList.remove('open');
  dayCtx = null;
}

function saveDay() {
  const name = document.getElementById('day-name-input').value.trim();
  if (!name) { document.getElementById('day-name-input').focus(); return; }
  if (dayCtx.mode === 'edit') {
    CFG[dayCtx.di].label = name;
  } else {
    CFG.push({ label: name, color: '#F0EDE8' });
    data.push([]);
    setsDone.push([]);
    activeDay = CFG.length - 1;
  }
  closeDaySheet();
  persist(); render();
}

function deleteDay() {
  if (!dayCtx || dayCtx.mode !== 'edit') return;
  const di = dayCtx.di;
  if (data.length <= 1) return; // nu permite ștergerea ultimei zile
  data.splice(di, 1);
  setsDone.splice(di, 1);
  CFG.splice(di, 1);
  if (activeDay >= data.length) activeDay = data.length - 1;
  closeDaySheet();
  persist(); render();
}

function render() { updateFooter(); renderTabs(); renderTable(); }

document.getElementById('fab').onclick = () => doAdd(activeDay);

render();

// ── PWA SETUP ──
// Inline manifest injected as blob so the app works from a single HTML file
const manifest = {
  name: "∞",
  short_name: "KIS",
  description: "Minimalist workout tracker",
  start_url: ".",
  display: "standalone",
  background_color: "#0A0A0A",
  theme_color: "#0A0A0A",
  orientation: "portrait",
  icons: [
    { src: makeIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: makeIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};

function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx2 = c.getContext('2d');
  // Background
  ctx2.fillStyle = '#0A0A0A';
  ctx2.fillRect(0, 0, size, size);
  // Letter K
  ctx2.fillStyle = '#F0EDE8';
  ctx2.font = `${size * 0.52}px 'Georgia', serif`;
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText('K', size / 2, size / 2);
  return c.toDataURL('image/png');
}

// Inject manifest as blob URL
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestURL = URL.createObjectURL(manifestBlob);
document.getElementById('manifest-placeholder').href = manifestURL;

// ── SERVICE WORKER (inline via blob) ──
const swCode = `
const CACHE = 'kis-v1';
const ASSETS = ['/'];
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline')))
  );
});
`;
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, { scope: '/' }).catch(() => {});
}

// ── INSTALL PROMPT ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    width:calc(100% - 44px); max-width:436px;
    background:#F0EDE8; color:#0A0A0A;
    border-radius:8px; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    z-index:999; box-shadow:0 4px 24px rgba(0,0,0,.5);
    font-family:'Space Mono',monospace;
    animation: slideUp .3s cubic-bezier(.32,1,.4,1);
  `;
  banner.innerHTML = `
    <style>@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}</style>
    <div>
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px">Install App</div>
      <div style="font-size:9px;color:#555;letter-spacing:.04em">Add to Home Screen</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="dismissInstall()" style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;background:rgba(0,0,0,.08);border:none;border-radius:4px;padding:8px 12px;cursor:pointer;text-transform:uppercase;color:#555">Later</button>
      <button onclick="doInstall()" style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;background:#0A0A0A;color:#F0EDE8;border:none;border-radius:4px;padding:8px 14px;cursor:pointer;text-transform:uppercase">Install</button>
    </div>
  `;
  document.body.appendChild(banner);
}

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
}
function dismissInstall() {
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}

window.addEventListener('appinstalled', () => dismissInstall());
</script>
