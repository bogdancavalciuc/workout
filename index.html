<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D110E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="KIS">
<title>∞</title>
<link rel="manifest" href="#" id="manifest-placeholder">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D110E;
  --surf: #141A15;
  --surf2: #1A211B;
  --line: #223024;
  --line2: #2C3E2E;
  --text: #E8EDE0;
  --muted: #5A7060;
  --muted2: #7A9080;
  --accent: #C8A96E;
  --r: 4px;
  --r2: 8px;
  --font: 'Playfair Display', serif;
  --mono: 'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 130px;
}

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); }

.top { padding: 62px 22px 0; }
.brand {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
}
.brand-left {}
.brand-name {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: .02em;
  line-height: 1;
  color: var(--text);
  opacity: .75;
}
.brand-sub { display: none; }

.brand-timer {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.st-play {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--line2);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
  opacity: .5;
}
.st-play.running { border-color: var(--accent); background: var(--accent); color: var(--bg); opacity: 1; }
.st-val {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: .18em;
  color: var(--text);
  opacity: .5;
}
.brand-timer.running .st-val { opacity: 1; }

.page-nav {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.pn {
  flex: 1;
  padding: 12px 0 10px;
  text-align: center;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: .18em;
  color: var(--muted);
  cursor: pointer;
  transition: color .2s;
  text-transform: uppercase;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
}
.pn.active { color: var(--accent); border-bottom-color: var(--accent); }

.day-tabs { display: flex; gap: 5px; margin-bottom: 18px; }
.dt {
  flex: 1;
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 4px 7px;
  text-align: center;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.dt.active { background: var(--accent); border-color: var(--accent); }
.dt-dot { display: none; }
.dt-vol { display: none; }
.dt-label {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .01em;
  display: block;
  color: var(--text);
  text-transform: none;
}
.dt.active .dt-label { color: var(--bg); }
.dt-edit {
  display: none;
  font-family: var(--mono);
  font-size: 14px;
  background: none;
  border: none;
  color: rgba(10,10,10,.6);
  cursor: pointer;
  padding: 0;
  margin-top: 2px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: .05em;
}
.dt.active .dt-edit { display: block; }
body.light .dt.active .dt-edit { color: rgba(240,237,232,.8); }
.dt-add {
  flex: 0 0 32px !important;
  padding: 8px 4px !important;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tbl-wrap {
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  overflow: hidden;
  isolation: isolate;
}
.ex-block { border-bottom: 1px solid var(--line); }
.ex-block:last-of-type { border-bottom: none; }

.ex-name-row {
  display: flex;
  align-items: center;
  padding: 14px 16px 14px 10px;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
  position: relative;
}
.ex-name-row:active { background: var(--surf2); }

.ex-main { flex: 1; min-width: 0; }
.en {
  font-size: 13px;
  font-weight: 500;
  text-transform: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: .01em;
  line-height: 1.2;
}
.ex-last { font-family: var(--mono); font-size: 7.5px; color: var(--muted); margin-top: 3px; }

.ex-name-row.done-all .en { opacity: .35; color: var(--muted); text-decoration: none; }
.ex-name-row.done-all .ex-last { display: none; }
.ex-name-row.done-all::before {
  content: '';
  display: block;
  width: 3px;
  height: 100%;
  position: absolute;
  left: 0;
  top: 0;
  background: var(--accent);
  opacity: .6;
  border-radius: 0 2px 2px 0;
}
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.set-progress { font-family: var(--mono); font-size: 10px; min-width: 26px; text-align: right; transition: color .2s; color: var(--muted); }
.chevron { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--muted2); transition: transform .25s cubic-bezier(.4,0,.2,1); font-size: 12px; }
.chevron.open { transform: rotate(180deg); }

.ex-edit-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; opacity: .45; transition: opacity .15s; }
.ex-edit-btn:active { background: var(--line); opacity: 1; }
.ex-edit-btn svg { display: block; }

.sets-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .25s cubic-bezier(.4,0,.2,1); }
.sets-wrap.open { grid-template-rows: 1fr; }
.sets-inner { overflow: hidden; }
.sets-pad { padding: 0; }
.sets-header {
  display: grid;
  grid-template-columns: 30px 1fr 60px 60px 44px;
  align-items: center;
  padding: 5px 10px 6px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 2px;
}
.sets-header span {
  font-family: var(--mono);
  font-size: 7.5px;
  color: var(--muted);
  letter-spacing: .10em;
  text-transform: uppercase;
  text-align: center;
}
.sets-header span:first-child { text-align: center; }
.sets-header span:nth-child(2) { text-align: left; }

.set-row {
  display: grid;
  grid-template-columns: 30px 1fr 60px 60px 44px;
  align-items: center;
  gap: 0;
  padding: 4px 10px;
  border-radius: 0;
  transition: background .2s;
  min-height: 42px;
  border-bottom: 1px solid rgba(255,255,255,.03);
}
.set-row.set-done { background: rgba(240,237,232,.035); }
body.light .set-row.set-done { background: rgba(10,10,10,.04); }
.set-row:last-of-type { border-bottom: none; }

.set-num {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  letter-spacing: 0;
}
.set-num.done-num { color: var(--muted); }
.set-info { font-family: var(--mono); font-size: 11px; color: var(--text); transition: all .2s; }
.set-info.done { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(240,237,232,.2); }
.set-wt { font-family: var(--mono); font-size: 10px; color: var(--muted2); transition: opacity .2s; }
.set-wt.done { opacity: .25; }
.set-prev { font-family: var(--mono); font-size: 8px; color: var(--muted); opacity: .5; margin-top: 2px; }
.set-check-wrap {
  position: relative;
  width: 44px; height: 44px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.set-check {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--line2);
  background: var(--surf2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, background .2s, transform .2s;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.set-check.checked { border-color: var(--accent); background: var(--accent); }
body.light .set-check.checked { background: var(--accent); border-color: var(--accent); }
.set-check svg { opacity: 0; transition: opacity .15s; }
.set-check.checked svg { opacity: 1; }

.set-input {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  background: var(--surf2);
  border: 1px solid var(--line2);
  border-radius: 5px;
  outline: none;
  padding: 6px 4px;
  width: 52px;
  text-align: center;
  -webkit-appearance: none;
  transition: border-color .15s, background .15s;
}
.set-input:focus { border-color: var(--muted2); background: var(--surf); }
.set-input.done { opacity: .3; pointer-events: none; }
.set-input-wt { width: 52px; }

.edit-panel { padding: 6px 16px 14px; border-top: 1px solid var(--line); background: rgba(240,237,232,.02); }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.edit-grid label { font-family: var(--mono); font-size: 7.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; display: block; margin-bottom: 5px; }
.ie-input {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surf2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  outline: none;
  color: var(--text);
  padding: 9px 6px;
  width: 100%;
  text-align: center;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.ie-input:focus { border-color: var(--muted2); }
.kg-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.kg-wrap .ie-input,
.kg-wrap .field-input-inner {
  padding-right: 28px;
  width: 100%;
}
.kg-suffix {
  position: absolute;
  right: 8px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  pointer-events: none;
  letter-spacing: .06em;
}
.edit-btns { display: flex; gap: 8px; }
.eb { flex: 1; font-family: var(--mono); font-size: 8.5px; letter-spacing: .1em; padding: 11px; border-radius: var(--r); border: none; cursor: pointer; text-transform: uppercase; transition: opacity .15s; }
.eb:active { opacity: .7; }
.eb-save { background: var(--accent); color: var(--bg); }
.eb-del { background: none; border: 1px solid var(--line); color: var(--muted); }

.del-confirm { display: flex; align-items: center; gap: 10px; padding: 13px 16px; background: rgba(200,169,110,.05); border-bottom: 1px solid rgba(200,169,110,.12); }
.del-txt { font-family: var(--mono); font-size: 10px; color: var(--muted2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.del-btn { font-family: var(--mono); font-size: 8.5px; padding: 7px 13px; border-radius: var(--r); border: none; cursor: pointer; white-space: nowrap; letter-spacing: .06em; }
.del-no { background: var(--surf2); color: var(--muted); }
.del-yes { background: var(--accent); color: var(--bg); }

.ar {
  display: flex; align-items: center;
  padding: 14px 16px; cursor: pointer; gap: 12px;
  color: var(--muted); font-size: 12px;
  border-top: 1px solid var(--line);
  transition: background .15s, color .15s;
  font-family: var(--font); font-weight: 400; letter-spacing: .01em;
}
.ar:active { background: var(--surf2); color: var(--text); }
.ai { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--line2); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: var(--muted); font-family: var(--mono); line-height: 1; }

.footer-stats {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 12px 0 4px;
  font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .06em;
}
.fs-dot { opacity: .2; }

.done-banner {
  display: none;
  border-radius: var(--r2);
  padding: 22px;
  margin-bottom: 14px;
  text-align: center;
  border: 1px solid var(--line);
  background: var(--surf);
}
.done-banner.show { display: block; animation: slideDown .3s cubic-bezier(.4,0,.2,1); }
.done-icon { font-size: 24px; margin-bottom: 10px; }
.done-title { font-family: var(--font); font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.done-sub { font-family: var(--mono); font-size: 8.5px; color: var(--muted); letter-spacing: .08em; }
.done-reset { margin-top: 16px; background: none; border: 1px solid var(--line); border-radius: var(--r); padding: 9px 18px; font-family: var(--mono); font-size: 8.5px; letter-spacing: .1em; color: var(--muted); cursor: pointer; transition: background .15s, color .15s; text-transform: uppercase; }
.done-reset:hover { background: var(--line); color: var(--text); }

/* ── HISTORY ── */
.hist-empty { text-align: center; padding: 70px 20px; color: var(--muted); font-size: 18px; font-family: var(--font); line-height: 1.6; }
.hist-item { background: var(--surf); border: 1px solid var(--line); border-radius: var(--r2); overflow: hidden; margin-bottom: 10px; }
.hist-head { padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
.hist-dot { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; background: var(--accent); opacity: .7; }
.hist-info { flex: 1; }
.hist-day { font-family: var(--font); font-size: 14px; font-weight: 500; }
.hist-date { font-family: var(--mono); font-size: 8px; color: var(--muted); margin-top: 2px; letter-spacing: .04em; }
.hist-meta { display: flex; align-items: center; gap: 8px; }
.hist-badge { font-family: var(--mono); font-size: 8.5px; color: var(--muted); background: var(--surf2); border-radius: var(--r); padding: 4px 9px; }
.hist-del { font-family: var(--mono); font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; line-height: 1; }
.hist-del:active { background: var(--line); }
.hist-exs { border-top: 1px solid var(--line); }
.hist-row { display: grid; grid-template-columns: 18px 1fr 30px 30px 56px; padding: 9px 18px; border-bottom: 1px solid var(--line); align-items: center; gap: 4px; }
.hist-row:last-child { border-bottom: none; }
.hc { font-family: var(--mono); font-size: 9.5px; color: var(--muted); }
.hc.nm { font-family: var(--font); font-size: 12px; color: var(--text); font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hc.r { text-align: center; }

/* ── PROGRESS PAGE ── */
.progress-page { padding: 0 22px; }
.prog-title { font-family: var(--font); font-size: 20px; font-weight: 500; margin-bottom: 6px; }
.prog-sub { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 22px; }
.prog-select-wrap { margin-bottom: 20px; }
.prog-select-wrap label { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; display: block; margin-bottom: 7px; }
.prog-select {
  width: 100%;
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 11px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 400;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
}
.prog-empty { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--font); font-size: 16px; }
.chart-wrap { background: var(--surf); border: 1px solid var(--line); border-radius: var(--r2); padding: 20px; margin-bottom: 14px; }
.chart-label { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 16px; }
.chart-canvas { width: 100%; height: 160px; position: relative; }
.chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--line); border-radius: var(--r); overflow: hidden; margin-top: 16px; }
.cs { background: var(--surf2); padding: 12px 14px; text-align: center; }
.cs-val { font-family: var(--mono); font-size: 16px; color: var(--accent); letter-spacing: -.03em; }
.cs-label { font-family: var(--mono); font-size: 7.5px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }

/* ── FAB ── */
.fw {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  padding: 16px 22px 34px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  z-index: 10;
}
.fab {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .2em;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity .2s;
}
.fab:active { opacity: .82; }

/* ── ADD SHEET ── */
.ov {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,10,10,.82);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.ov.open { display: flex; }
.sh {
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: 16px 16px 0 0;
  padding: 26px 22px 44px;
  width: 100%;
  max-width: 480px;
  animation: sheetUp .28s cubic-bezier(.32,1,.4,1);
}
.shh { width: 30px; height: 2px; background: var(--line2); border-radius: 2px; margin: 0 auto 24px; }
.shl { font-family: var(--font); font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 22px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; }
.field input, .field textarea {
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 13px 15px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: var(--muted2); }
.r3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.bsv {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--r);
  background: var(--accent);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .18em;
  cursor: pointer;
  margin-top: 8px;
  text-transform: uppercase;
  transition: opacity .2s;
}
.bsv:active { opacity: .82; }

.hint { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .06em; text-align: center; padding: 8px 0 2px; opacity: .55; text-transform: none; }
.hidden { display: none !important; }

/* ── DRAG & DROP ── */
.ex-block.dragging { opacity: .4; }
.ex-block.drag-over { border-top: 2px solid var(--accent); }
.drag-num {
  cursor: grab;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border: 1px solid var(--line2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 7px;
  color: var(--muted);
  user-select: none;
  transition: border-color .15s, color .15s;
}
.drag-num:active { cursor: grabbing; border-color: var(--muted2); color: var(--text); }

/* ── ANIMATIONS ── */
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.3); }
  70%  { transform: scale(.93); }
  100% { transform: scale(1); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes sheetUp {
  from { transform: translateY(48px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.pop { animation: pop .3s cubic-bezier(.34,1.56,.64,1); }

/* ── INF TOGGLE ── */
.inf-toggle {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  margin-right: 6px;
  transition: opacity .2s;
  opacity: .85;
}
.inf-toggle:active { opacity: .5; }
.inf-knob {
  transition: cx .4s cubic-bezier(.4,0,.2,1);
}
body.light .inf-knob { cx: 33px; }

/* ── LIGHT MODE ── */
body.light {
  --bg: #F2F5EE;
  --surf: #E8EDE1;
  --surf2: #DDE4D4;
  --line: #CDD6C2;
  --line2: #BCC8B0;
  --text: #1A2118;
  --muted: #6E8265;
  --muted2: #4E6245;
}

/* ── SET CONTROLS ── */
.set-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 14px 14px;
  border-top: 1px solid var(--line);
  background: var(--bg);
}
.set-ctrl-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 13px 10px;
  cursor: pointer;
  transition: opacity .15s, background .15s;
  white-space: nowrap;
  font-weight: 700;
}
.set-ctrl-btn:active { opacity: .7; }
.set-ctrl-btn:disabled { opacity: .22; cursor: default; }
.set-ctrl-add { background: var(--accent); color: var(--bg); border: none; }
.set-ctrl-rem { background: none; border: 1.5px solid var(--line2); color: var(--muted2); }
.set-ctrl-btn svg { flex-shrink: 0; }
.set-ctrl-btn .ctrl-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

/* ── DEL EXERCISE ── */
.del-ex-btn {
  width: 100%;
  padding: 14px;
  background: none;
  border: 1.5px solid rgba(200,169,110,.25);
  border-radius: var(--r);
  color: var(--muted2);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  display: none;
  margin-top: 8px;
}
.del-ex-btn.visible { display: block; }
.del-ex-btn:active { background: rgba(200,169,110,.06); border-color: rgba(200,169,110,.5); }

/* ── PREV HINT ── */
.set-input-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
}
.set-prev-hint {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--muted);
  opacity: .5;
  letter-spacing: .04em;
  margin-top: 2px;
  text-align: center;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   REST TIMER OVERLAY
═══════════════════════════════════════ */
.rest-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(13,17,14,.96);
  backdrop-filter: blur(12px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  animation: fadeIn .2s ease;
}
body.light .rest-overlay { background: rgba(242,245,238,.96); }
.rest-overlay.active { display: flex; }

.rest-set-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.rest-svg-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 18px;
}
.rest-circle-bg {
  fill: none;
  stroke: var(--line2);
  stroke-width: 3;
}
.rest-circle-prog {
  fill: none;
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  transform-origin: center;
  transform: rotate(-90deg);
  transition: stroke-dashoffset .9s linear, stroke .3s;
}
.rest-circle-prog.urgent { stroke: #E07B5A; }
.rest-time-display {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.rest-time-val {
  font-family: var(--mono);
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -.04em;
  color: var(--text);
  line-height: 1;
}
.rest-time-unit {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .18em;
  text-transform: uppercase;
}

.rest-ex-name {
  font-family: var(--font);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
  opacity: .7;
  text-align: center;
  padding: 0 32px;
}
.rest-next-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  letter-spacing: .16em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

/* Duration buttons */
.rest-duration-row {
  display: flex;
  gap: 8px;
  margin-bottom: 22px;
}
.rest-dur-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .12em;
  padding: 9px 16px;
  border-radius: 20px;
  border: 1px solid var(--line2);
  background: none;
  color: var(--muted2);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  text-transform: uppercase;
}
.rest-dur-btn.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
}
.rest-dur-btn:active { opacity: .7; }

/* +/- adjust */
.rest-adjust-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 26px;
}
.rest-adj-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--line2);
  background: none;
  color: var(--muted2);
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, color .15s, background .15s;
}
.rest-adj-btn:active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,.08); }
.rest-adj-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  letter-spacing: .14em;
  text-transform: uppercase;
  min-width: 60px;
  text-align: center;
}

/* Action buttons */
.rest-btns {
  display: flex;
  gap: 10px;
}
.rest-skip-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .16em;
  padding: 14px 26px;
  border-radius: var(--r);
  border: 1.5px solid var(--line2);
  background: none;
  color: var(--muted2);
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity .15s;
}
.rest-skip-btn:active { opacity: .6; }
.rest-done-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .16em;
  padding: 14px 26px;
  border-radius: var(--r);
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity .15s;
}
.rest-done-btn:active { opacity: .8; }

/* Finished flash */
@keyframes restDone {
  0%   { background: var(--accent); }
  100% { background: transparent; }
}

/* Rest toggle in set-controls */
.rest-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px 4px;
  border-top: 1px solid var(--line);
}
.rest-toggle-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
}
.rest-toggle-switch {
  position: relative;
  width: 34px;
  height: 18px;
  cursor: pointer;
}
.rest-toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.rest-toggle-track {
  position: absolute;
  inset: 0;
  border-radius: 9px;
  background: var(--line2);
  transition: background .2s;
}
.rest-toggle-switch input:checked + .rest-toggle-track { background: var(--accent); }
.rest-toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--text);
  transition: transform .2s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.rest-toggle-switch input:checked ~ .rest-toggle-knob { transform: translateX(16px); }

/* ═══════════════════════════════════════
   BACKUP / RESTORE
═══════════════════════════════════════ */
.backup-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 16px;
  background: var(--surf);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  margin-bottom: 14px;
  gap: 10px;
}
.backup-bar-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.backup-bar-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text);
  opacity: .7;
}
.backup-bar-sub {
  font-family: var(--mono);
  font-size: 7.5px;
  color: var(--muted);
  letter-spacing: .04em;
}
.backup-btns {
  display: flex;
  gap: 7px;
  flex-shrink: 0;
}
.backup-btn {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 8px 13px;
  border-radius: var(--r);
  cursor: pointer;
  transition: opacity .15s, background .15s;
  white-space: nowrap;
}
.backup-btn:active { opacity: .7; }
.backup-btn-export {
  background: var(--accent);
  color: var(--bg);
  border: none;
}
.backup-btn-import {
  background: none;
  border: 1.5px solid var(--line2);
  color: var(--muted2);
}

/* Post-session backup nudge */
.backup-nudge {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  background: rgba(200,169,110,.06);
  border: 1px solid rgba(200,169,110,.2);
  border-radius: var(--r);
  margin-top: 12px;
  animation: slideDown .3s cubic-bezier(.4,0,.2,1);
}
.backup-nudge.show { display: flex; }
.backup-nudge-txt {
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--muted2);
  letter-spacing: .04em;
  flex: 1;
  line-height: 1.5;
}
.backup-nudge-btn {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 8px 13px;
  border-radius: var(--r);
  background: var(--accent);
  color: var(--bg);
  border: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.backup-nudge-dismiss {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  flex-shrink: 0;
}

/* Import toast */
.import-toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surf);
  border: 1px solid var(--line2);
  border-radius: var(--r);
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--text);
  z-index: 999;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.import-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.import-toast.ok { border-color: var(--accent); color: var(--accent); }
.import-toast.err { border-color: #E07B5A; color: #E07B5A; }
</style>
</head>
<body>

<!-- REST TIMER OVERLAY -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-set-label" id="rest-set-label">Set 1 complete</div>

  <div class="rest-svg-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="rest-circle-bg" cx="100" cy="100" r="88"/>
      <circle class="rest-circle-prog" id="rest-circle" cx="100" cy="100" r="88"
        stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="rest-time-display">
      <div class="rest-time-val" id="rest-time-val">90</div>

  <div class="rest-ex-name" id="rest-ex-name"></div>

<div class="top">
  <div class="brand">
    <div class="brand-left">
      <div class="brand-name">
        <button class="inf-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <svg width="44" height="22" viewBox="0 0 44 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="9.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="33" cy="11" r="9.5" stroke="currentColor" stroke-width="1.4"/>
            <circle class="inf-knob" cx="11" cy="11" r="5.5" fill="currentColor"/>

        </button>

        </svg>
      </button>
      <span class="st-val" id="st-val">00:00</span>

  <div class="page-nav">

</div>

<!-- hidden file input for import -->

<!-- toast -->

<!-- WORKOUT PAGE -->

  <!-- BACKUP BAR -->
  <div class="backup-bar">

<script>
// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
const savedTheme = localStorage.getItem('kis8_theme') || 'dark';
if (savedTheme === 'light') document.body.classList.add('light');
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('kis8_theme', isLight ? 'light' : 'dark');
}

// ══════════════════════════════════════
// DEFAULTS & STATE
// ══════════════════════════════════════
const DEF_CFG = [
  { label: 'Chest' },
  { label: 'Back'  },
  { label: 'Legs'  }
];
let CFG = JSON.parse(localStorage.getItem('kis8_cfg')||'null') || DEF_CFG.map(c=>({...c, color:'#C8A96E'}));

const DEF = [
  [
    {id:1,name:'Incline Bench Press',sets:3,reps:12,weight:'25KG'},
    {id:2,name:'Machine Chest Fly',sets:3,reps:12,weight:'45KG'},
    {id:3,name:'Barbell Overhead Press',sets:3,reps:12,weight:'30KG'},
    {id:4,name:'DB Lateral Raises',sets:3,reps:12,weight:'6KG'},
    {id:5,name:'Triceps Push Down',sets:3,reps:12,weight:'36KG'}
  ],
  [
    {id:1,name:'Supinated Lat Pulldown',sets:3,reps:12,weight:'40KG'},
    {id:2,name:'Pronated Cable Row',sets:3,reps:12,weight:'36KG'},
    {id:3,name:'Biceps Curls',sets:3,reps:12,weight:'12KG'},
    {id:4,name:'Rope Trap Shrug',sets:3,reps:15,weight:'40KG'},
    {id:5,name:'Hyperextensions',sets:3,reps:15,weight:'BW'}
  ],
  [
    {id:1,name:'Barbell Back Squat',sets:3,reps:8,weight:'70KG'},
    {id:2,name:'Deadlift',sets:3,reps:8,weight:'70KG'},
    {id:3,name:'Standing Calf Raise',sets:3,reps:20,weight:'150KG'},
    {id:4,name:'Incline Bench Press',sets:3,reps:12,weight:'25KG'},
    {id:5,name:'Machine Chest Fly',sets:3,reps:12,weight:'45KG'}
  ]
];

let data      = JSON.parse(localStorage.getItem('kis8_data')||'null') || DEF.map(d => d.map(e => ({...e})));
// FIX: ensure setsDone is always an array
let setsDoneRaw = localStorage.getItem('kis8_sets');
let setsDone  = (setsDoneRaw && Array.isArray(JSON.parse(setsDoneRaw))) ? JSON.parse(setsDoneRaw) : null;
let history   = JSON.parse(localStorage.getItem('kis8_hist')||'[]');
let activeDay = 0, sheetCtx = null, editingEx = null, deleteConfirm = null;
let expanded  = new Set();
// FIX: separate restEnabled per day-exercise
let restEnabled = JSON.parse(localStorage.getItem('kis8_rest_en')||'{}');
let restDefaultDuration = parseInt(localStorage.getItem('kis8_rest_dur')||'90');

// ══════════════════════════════════════
// SESSION TIMER
// ══════════════════════════════════════
let sessionStart = null, sessionTick = null, sessionActive = false;
function startSessionTimer() {
  if (sessionActive) return;
  sessionActive = true;
  sessionStart = Date.now();
  sessionTick = setInterval(updateSessionUI, 1000);
  updateSessionUI();
  updatePlayBtn();
}
function stopSessionTimer() {
  sessionActive = false;
  clearInterval(sessionTick); sessionTick = null;
  document.getElementById('st-val').textContent = '00:00';
  updatePlayBtn();
}
function toggleSessionTimer() {
  if (sessionActive) stopSessionTimer();
  else startSessionTimer();
}
function updateSessionUI() {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('st-val').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updatePlayBtn() {
  const btn = document.getElementById('st-play');
  const icon = document.getElementById('st-icon');
  const timer = btn?.closest('.brand-timer');
  if (!btn || !icon) return;
  if (sessionActive) {
    btn.classList.add('running');
    if (timer) timer.classList.add('running');
    icon.innerHTML = '<rect x="2" y="1" width="3" height="10"/><rect x="7" y="1" width="3" height="10"/>';
  } else {
    btn.classList.remove('running');
    if (timer) timer.classList.remove('running');
    icon.innerHTML = '<polygon points="2,1 11,6 2,11"/>';
  }
}

// ══════════════════════════════════════
// REST TIMER
// ══════════════════════════════════════
let restTick = null;
let restRemaining = 0;
let restTotal = 90;
let restExName = '';
let restSetNum = 0;
const CIRCUMFERENCE = 2 * Math.PI * 88; // r=88

function openRestTimer(exName, setNum, duration) {
  restTotal = duration;
  restRemaining = duration;
  restExName = exName;
  restSetNum = setNum;

  document.getElementById('rest-ex-name').textContent = exName;
  document.getElementById('rest-set-label').textContent = `Set ${setNum} complete`;
  document.getElementById('rest-time-val').textContent = duration;

  // Update selected duration button
  updateRestDurBtns(duration);
  updateRestCircle();

  document.getElementById('rest-overlay').classList.add('active');

  clearInterval(restTick);
  restTick = setInterval(tickRest, 1000);
}

function tickRest() {
  restRemaining -= 1;
  if (restRemaining <= 0) {
    restRemaining = 0;
    clearInterval(restTick);
    restTick = null;
    document.getElementById('rest-time-val').textContent = '0';
    updateRestCircle();
    beepRest();
    setTimeout(closeRestTimer, 800);
    return;
  }
  document.getElementById('rest-time-val').textContent = restRemaining;
  updateRestCircle();
}

function updateRestCircle() {
  const prog = restTotal > 0 ? restRemaining / restTotal : 0;
  const offset = CIRCUMFERENCE * (1 - prog);
  const circle = document.getElementById('rest-circle');
  circle.style.strokeDasharray = CIRCUMFERENCE;
  circle.style.strokeDashoffset = offset;
  circle.classList.toggle('urgent', restRemaining <= 10 && restRemaining > 0);
}

function closeRestTimer() {
  clearInterval(restTick); restTick = null;
  document.getElementById('rest-overlay').classList.remove('active');
}

function setRestDuration(sec) {
  restTotal = sec;
  restRemaining = sec;
  localStorage.setItem('kis8_rest_dur', sec);
  restDefaultDuration = sec;
  document.getElementById('rest-time-val').textContent = sec;
  updateRestDurBtns(sec);
  updateRestCircle();
  // Restart tick
  clearInterval(restTick);
  restTick = setInterval(tickRest, 1000);
}

function adjustRest(delta) {
  const newVal = Math.max(5, restRemaining + delta);
  restRemaining = newVal;
  if (delta > 0 && newVal > restTotal) restTotal = newVal;
  document.getElementById('rest-time-val').textContent = restRemaining;
  updateRestCircle();
}

function updateRestDurBtns(sel) {
  document.querySelectorAll('.rest-dur-btn').forEach(b => {
    const v = parseInt(b.textContent) * (b.textContent.includes('m') ? 60 : 1);
    b.classList.toggle('selected', v === sel);
  });
}

function beepRest() {
  try {
    const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
    [0, 120, 240].forEach(delay => {
      const o = ctx2.createOscillator();
      const g = ctx2.createGain();
      o.connect(g); g.connect(ctx2.destination);
      o.frequency.value = 880;
      o.type = 'sine';
      g.gain.setValueAtTime(0, ctx2.currentTime + delay/1000);
      g.gain.linearRampToValueAtTime(0.3, ctx2.currentTime + delay/1000 + 0.01);
      g.gain.linearRampToValueAtTime(0, ctx2.currentTime + delay/1000 + 0.18);
      o.start(ctx2.currentTime + delay/1000);
      o.stop(ctx2.currentTime + delay/1000 + 0.2);
    });
  } catch(e) {}
}

// ══════════════════════════════════════
// DATA SYNC
// ══════════════════════════════════════
function syncSets() {
  // FIX: ensure setsDone is always a proper array
  if (!Array.isArray(setsDone)) setsDone = [];
  data.forEach((day, di) => {
    if (!Array.isArray(setsDone[di])) setsDone[di] = [];
    day.forEach((ex, ei) => {
      if (!Array.isArray(setsDone[di][ei]) || setsDone[di][ei].length !== ex.sets) {
        const prev = Array.isArray(setsDone[di][ei]) ? setsDone[di][ei] : [];
        setsDone[di][ei] = Array.from({length: ex.sets}, (_, i) => prev[i] || false);
      }
      // FIX: trim setOvr to current sets count
      if (ex.setOvr && ex.setOvr.length > ex.sets) ex.setOvr = ex.setOvr.slice(0, ex.sets);
    });
  });
}
syncSets();

function persist() {
  localStorage.setItem('kis8_data', JSON.stringify(data));
  localStorage.setItem('kis8_sets', JSON.stringify(setsDone));
  localStorage.setItem('kis8_hist', JSON.stringify(history));
  localStorage.setItem('kis8_cfg',  JSON.stringify(CFG));
  localStorage.setItem('kis8_rest_en', JSON.stringify(restEnabled));
}

function isExDone(di, ei) {
  return Array.isArray(setsDone[di]?.[ei]) &&
    setsDone[di][ei].length > 0 &&
    setsDone[di][ei].every(Boolean);
}
function isAllDone(di) {
  return data[di].length > 0 && data[di].every((_, ei) => isExDone(di, ei));
}

function dayKey(d) {
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function lastFor(di, name) {
  for (const h of history) {
    if (h.day === CFG[di].label) {
      const ex = (h.exercises||[]).find(e => e.name === name);
      if (ex) return `${ex.sets}×${ex.reps} · ${ex.weight}`;
    }
  }
  return null;
}

function lastExData(di, name) {
  for (const h of history) {
    if (h.day === CFG[di].label) {
      const ex = (h.exercises||[]).find(e => e.name === name);
      if (ex) return { reps: ex.reps, weight: ex.weight };
    }
  }
  return null;
}

function calcVol(di) {
  return data[di].reduce((sum, ex) => {
    const kg = parseFloat(ex.weight);
    return isNaN(kg) ? sum : sum + kg * ex.sets * ex.reps;
  }, 0);
}
function fmtVol(v) { return v >= 1000 ? (v/1000).toFixed(1)+'t' : Math.round(v)+'kg'; }

function renderTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  data.forEach((_, di) => {
    const cfg = CFG[di], active = di === activeDay, done = isAllDone(di);
    const vol = calcVol(di);
    const el = document.createElement('div');
    el.className = 'dt' + (active ? ' active' : '') + (done && !active ? ' done' : '');
    el.innerHTML = `
      <div class="dt-dot"></div>
      <span class="dt-label">${cfg.label}</span>
      ${vol > 0 ? `<span class="dt-vol">${fmtVol(vol)}</span>` : ''}
      <button class="dt-edit" onclick="openDayEdit(event,${di})">···</button>`;
    el.onclick = (e) => {
      if (e.target.closest('.dt-edit')) return;
      saveInlineEdit(); activeDay = di; editingEx = null; deleteConfirm = null; expanded.clear(); render();
    };
    c.appendChild(el);

  const add = document.createElement('div');
  add.className = 'dt dt-add';
  add.innerHTML = `<span style="font-size:16px;line-height:1;color:var(--muted)">+</span>`;
  add.onclick = () => openDayAdd();

// ══════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════
let dragSrc = null;
function dragStart(e, di, ei) {
  dragSrc = { di, ei };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.ex-block').classList.add('dragging'), 0);
}
function dragOver(e, di, ei) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.ex-block').forEach(b => b.classList.remove('drag-over'));
  if (!dragSrc || (dragSrc.di === di && dragSrc.ei === ei)) return;
  e.target.closest('.ex-block')?.classList.add('drag-over');
}
function dragDrop(e, di, ei) {
  e.preventDefault();
  if (!dragSrc || dragSrc.di !== di || dragSrc.ei === ei) { dragEnd(e); return; }
  const src = dragSrc.ei, dst = ei;
  // Swap exercises
  const [ex] = data[di].splice(src, 1);
  data[di].splice(dst, 0, ex);
  // Swap setsDone
  const [sd] = setsDone[di].splice(src, 1);
  setsDone[di].splice(dst, 0, sd);
  // FIX: rebuild restEnabled keys properly using index remapping
  const newRestEnabled = {};
  Object.keys(restEnabled).forEach(k => {
    const parts = k.split('-');
    if (parts[0] !== String(di)) { newRestEnabled[k] = restEnabled[k]; }
  });
  data[di].forEach((_, i) => {
    const oldIdx = i === dst ? src : (i >= Math.min(src,dst) && i <= Math.max(src,dst)) ? i + (src < dst ? -1 : 1) : i;
    const oldKey = `${di}-${oldIdx}`;
    const newKey = `${di}-${i}`;
    if (restEnabled[oldKey] !== undefined) newRestEnabled[newKey] = restEnabled[oldKey];
  });
  restEnabled = newRestEnabled;
  dragSrc = null;
  persist(); render();
}
function dragEnd(e) {
  document.querySelectorAll('.ex-block').forEach(b => { b.classList.remove('dragging'); b.classList.remove('drag-over'); });
  dragSrc = null;
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function toggleExpand(di, ei) {
  if (editingEx) return;
  const key = `${di}-${ei}`;
  expanded.has(key) ? expanded.delete(key) : expanded.add(key);
  renderTable();
  updateDelExBtn();
}

function toggleRestEnabled(di, ei, val) {
  restEnabled[`${di}-${ei}`] = val;
  persist();
}

function toggleSet(e, di, ei, si) {
  e.stopPropagation();
  if (editingEx) saveInlineEdit();
  const wasChecked = setsDone[di][ei][si];
  setsDone[di][ei][si] = !wasChecked;

  if (!wasChecked) {
    expanded.add(`${di}-${ei}`);
    if (!sessionActive) startSessionTimer();
    // Launch rest timer if enabled and not the last set
    const ex = data[di][ei];
    const restKey = `${di}-${ei}`;
    const isRestOn = restEnabled[restKey] !== false;
    const isLastSet = si === ex.sets - 1;
    if (isRestOn && !isLastSet) {
      setTimeout(() => openRestTimer(ex.name, si + 1, restDefaultDuration), 200);
    }
  }

  if (isAllDone(di)) saveToHistory(di);
  persist(); render();

  requestAnimationFrame(() => {
    const btn = document.getElementById(`sc-${di}-${ei}-${si}`);
    if (btn && !wasChecked) { btn.classList.add('pop'); setTimeout(() => btn.classList.remove('pop'), 300); }
  });
}

// FIX: getPrevSet now skips current session (uses index > 0 in history)
function getPrevSet(di, exName, si) {
  for (const h of history) {
    if (h.day === CFG[di].label) {
      const ex = (h.exercises||[]).find(e => e.name === exName);
      if (!ex) return null;
      const reps = (ex.setOvr && ex.setOvr[si] && ex.setOvr[si].reps != null) ? ex.setOvr[si].reps : ex.reps;
      const weight = (ex.setOvr && ex.setOvr[si] && ex.setOvr[si].weight != null) ? ex.setOvr[si].weight : ex.weight;
      return { reps, weight };
    }
  }
  return null;
}

function getSetReps(ex, si) {
  return (ex.setOvr && ex.setOvr[si] && ex.setOvr[si].reps != null) ? ex.setOvr[si].reps : ex.reps;
}
function getSetWeight(ex, si) {
  return (ex.setOvr && ex.setOvr[si] && ex.setOvr[si].weight != null) ? ex.setOvr[si].weight : ex.weight;
}

function saveSetOvr(di, ei, si, field, val) {
  const ex = data[di][ei];
  if (!ex.setOvr) ex.setOvr = [];
  if (!ex.setOvr[si]) ex.setOvr[si] = {};
  if (field === 'reps') {
    const v = parseInt(val);
    ex.setOvr[si].reps = (!isNaN(v) && v > 0) ? v : ex.reps;
  } else {
    // FIX: treat "0" as valid weight (not BW)
    const t = val.trim().toUpperCase();
    ex.setOvr[si].weight = t;
  }
  persist();
}

function startEdit(di, ei, e) {
  if (e) e.stopPropagation();
  if (editingEx && (editingEx.di !== di || editingEx.ei !== ei)) saveInlineEdit();
  expanded.add(`${di}-${ei}`);
  deleteConfirm = null; editingEx = { di, ei }; renderTable();
}
function saveInlineEdit() {
  if (!editingEx) return;
  const { di, ei } = editingEx;
  const nameEl = document.getElementById('ie-name');
  const newName = nameEl ? nameEl.value.trim() : '';
  if (newName) data[di][ei].name = newName;
  persist();
  editingEx = null; render();
}
function cancelDelete() { deleteConfirm = null; renderTable(); }
function confirmDelete(di, ei) {
  data[di].splice(ei, 1); setsDone[di].splice(ei, 1);
  expanded.delete(`${di}-${ei}`);
  // Rebuild restEnabled for this day after deletion
  const newRestEnabled = {};
  Object.keys(restEnabled).forEach(k => {
    const parts = k.split('-');
    const kdi = parseInt(parts[0]), kei = parseInt(parts[1]);
    if (kdi !== di) { newRestEnabled[k] = restEnabled[k]; return; }
    if (kei < ei) newRestEnabled[k] = restEnabled[k];
    else if (kei > ei) newRestEnabled[`${di}-${kei-1}`] = restEnabled[k];
    // kei === ei is dropped
  });
  restEnabled = newRestEnabled;
  deleteConfirm = null; persist(); render();
}

// FIX: deep clone exercises when saving to history to avoid reference mutation
function saveToHistory(di) {
  const cfg = CFG[di], now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  const dk = dayKey(now);
  if (history.length && history[0].day === cfg.label && history[0].dk === dk) return;
  history.unshift({
    day: cfg.label,
    date: dateStr,
    dk,
    ts: now.getTime(),
    exercises: JSON.parse(JSON.stringify(data[di]))  // FIX: deep clone
  });
  if (history.length > 60) history = history.slice(0, 60);
  persist();
  // Show backup nudge after session complete
  setTimeout(() => {
    const nudge = document.getElementById('backup-nudge');
    if (nudge) nudge.classList.add('show');
  }, 600);
}

// FIX: resetSession also clears setOvr per exercise
function resetSession() {
  data[activeDay].forEach(ex => { delete ex.setOvr; });
  setsDone[activeDay] = data[activeDay].map(e => Array(e.sets).fill(false));
  expanded.clear(); persist(); render();
}

function deleteHistory(hi) { history.splice(hi, 1); persist(); renderHistory(); }

// ══════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════
function initProgress() {
  const sel = document.getElementById('prog-ex-select');
  const prev = sel.value;
  const nameSet = new Set();
  history.forEach(h => (h.exercises||[]).forEach(e => nameSet.add(e.name)));
  data.forEach(day => day.forEach(e => nameSet.add(e.name)));
  const names = Array.from(nameSet).sort();
  sel.innerHTML = '<option value="">— choose an exercise —</option>' +
    names.map(n => `<option value="${escHtml(n)}"${n === prev ? ' selected':''} >${escHtml(n)}</option>`).join('');
  renderProgress();
}

function renderProgress() {
  const sel = document.getElementById('prog-ex-select');
  const name = sel.value;
  const c = document.getElementById('prog-content');
  if (!name) { c.innerHTML = '<div class="prog-empty">Select an exercise to view progress.</div>'; return; }

  const pts = [];
  for (let i = history.length - 1; i >= 0; i--) {
    const h = history[i];
    const ex = (h.exercises||[]).find(e => e.name === name);
    if (ex) {
      const kg = parseFloat(ex.weight);
      pts.push({ date: h.date.replace(/\w+, /,''), weight: isNaN(kg) ? 0 : kg, sets: ex.sets, reps: ex.reps, raw: ex.weight });
    }
  }
  if (!pts.length) {
    c.innerHTML = '<div class="prog-empty">No history found for this exercise yet.</div>';
    return;
  }

  const max = Math.max(...pts.map(p => p.weight));
  const min = Math.min(...pts.map(p => p.weight));
  const range = max - min || 1;
  const W = 400, H = 120, padX = 10, padY = 14;
  const plotW = W - padX * 2, plotH = H - padY * 2;

  const xStep = pts.length > 1 ? plotW / (pts.length - 1) : plotW;
  const points = pts.map((p, i) => ({
    x: padX + (pts.length > 1 ? i * xStep : plotW / 2),
    y: padY + plotH - ((p.weight - min) / range) * plotH,
    ...p
  }));

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(padY+plotH).toFixed(1)} L${points[0].x.toFixed(1)},${(padY+plotH).toFixed(1)} Z`;

  const last = pts[pts.length - 1];
  const first = pts[0];
  const diff = last.weight - first.weight;
  const diffStr = diff === 0 ? '—' : (diff > 0 ? '+' : '') + diff.toFixed(1) + 'kg';

  // FIX: use CSS variable references instead of hardcoded colors for progress chart
  c.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-label">${escHtml(name)} — Weight over time</div>
      <div class="chart-canvas">
        <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="overflow:visible">
          <defs>
            <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--text)" stop-opacity=".12"/>
              <stop offset="100%" stop-color="var(--text)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaD}" fill="url(#ag)"/>
          <path d="${pathD}" fill="none" stroke="var(--text)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
          ${points.map((p, i) => `
            <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i === points.length-1 ? 3.5 : 2}" fill="${i === points.length-1 ? 'var(--accent)' : 'var(--muted)'}" stroke="${i === points.length-1 ? 'var(--bg)' : 'none'}" stroke-width="1.5"/>
          `).join('')}
        </svg>
      </div>
      <div class="chart-stats">
        <div class="cs"><div class="cs-val">${last.raw}</div><div class="cs-label">Current</div></div>
        <div class="cs"><div class="cs-val">${max > 0 ? max + 'kg' : '—'}</div><div class="cs-label">Best</div></div>
        <div class="cs"><div class="cs-val">${diffStr}</div><div class="cs-label">Progress</div></div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;letter-spacing:.08em">${pts.length} session${pts.length!==1?'s':''} tracked</div>
  `;
}

// ══════════════════════════════════════
// ADD EXERCISE
// ══════════════════════════════════════
function doAdd(di) {
  saveInlineEdit(); sheetCtx = { di };
  document.getElementById('shl').textContent = 'Add to ' + CFG[di].label;
  ['fn','fs','fr','fw2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fs').value = '3';
  document.getElementById('fr').value = '12';
  document.getElementById('ov').classList.add('open');
  setTimeout(() => document.getElementById('fn').focus(), 300);
}

function saveEx() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { document.getElementById('fn').focus(); return; }
  const sets = parseInt(document.getElementById('fs').value) || 3;
  const reps = parseInt(document.getElementById('fr').value) || 12;
  const rawW = document.getElementById('fw2').value.trim();
  // FIX: treat "0" as valid weight; only fallback to BW if field is empty
  const weight = (rawW !== '' && rawW !== null) ? (isNaN(parseFloat(rawW)) ? rawW.toUpperCase() : parseFloat(rawW) + 'KG') : 'BW';
  const { di } = sheetCtx;
  const id = data[di].length ? Math.max(...data[di].map(e => e.id)) + 1 : 1;
  data[di].push({ id, name, sets, reps, weight });
  const newEi = data[di].length - 1;
  expanded.add(`${di}-${newEi}`);
  syncSets();
  document.getElementById('ov').classList.remove('open');
  persist(); render();
}

function maybeClose(e) { if (e.target === document.getElementById('ov')) document.getElementById('ov').classList.remove('open'); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════
// DAY MANAGEMENT
// ══════════════════════════════════════
let dayCtx = null;

function openDayEdit(e, di) {
  e.stopPropagation();
  dayCtx = { mode: 'edit', di };
  document.getElementById('day-sheet-title').textContent = 'Edit Day';
  document.getElementById('day-name-input').value = CFG[di].label;
  document.getElementById('day-del-btn').style.display = data.length > 1 ? '' : 'none';
  document.getElementById('ov-day').classList.add('open');
  setTimeout(() => document.getElementById('day-name-input').focus(), 300);
}
function openDayAdd() {
  dayCtx = { mode: 'add' };
  document.getElementById('day-sheet-title').textContent = 'Add Day';
  document.getElementById('day-name-input').value = '';
  document.getElementById('day-del-btn').style.display = 'none';
  document.getElementById('ov-day').classList.add('open');
  setTimeout(() => document.getElementById('day-name-input').focus(), 300);
}
function closeDaySheet() {
  document.getElementById('ov-day').classList.remove('open');
  dayCtx = null;
}
function saveDay() {
  const name = document.getElementById('day-name-input').value.trim();
  if (!name) { document.getElementById('day-name-input').focus(); return; }
  if (dayCtx.mode === 'edit') {
    CFG[dayCtx.di].label = name;
  } else {
    CFG.push({ label: name, color: '#C8A96E' });
    data.push([]);
    setsDone.push([]);
    activeDay = CFG.length - 1;
  }
  closeDaySheet();
  persist(); render();
}
function deleteDay() {
  if (!dayCtx || dayCtx.mode !== 'edit') return;
  const di = dayCtx.di;
  if (data.length <= 1) return;
  data.splice(di, 1);
  setsDone.splice(di, 1);
  CFG.splice(di, 1);
  if (activeDay >= data.length) activeDay = data.length - 1;
  closeDaySheet();
  persist(); render();
}

// ══════════════════════════════════════
// ADD / REMOVE SETS
// ══════════════════════════════════════
function addSet(e, di, ei) {
  e.stopPropagation();
  const ex = data[di][ei];
  ex.sets += 1;
  const lastSi = ex.sets - 2;
  if (!ex.setOvr) ex.setOvr = [];
  const lastOvr = ex.setOvr[lastSi] || {};
  ex.setOvr[ex.sets - 1] = { reps: lastOvr.reps ?? ex.reps, weight: lastOvr.weight ?? ex.weight };
  syncSets();
  persist(); renderTable(); updateDelExBtn();
}
function removeSet(e, di, ei) {
  e.stopPropagation();
  const ex = data[di][ei];
  if (ex.sets <= 1) return;
  ex.sets -= 1;
  if (ex.setOvr) ex.setOvr = ex.setOvr.slice(0, ex.sets);
  if (Array.isArray(setsDone[di]?.[ei])) setsDone[di][ei] = setsDone[di][ei].slice(0, ex.sets);
  syncSets();
  persist(); renderTable(); updateDelExBtn();
}

function startDeleteActive() {
  const di = activeDay;
  for (const key of expanded) {
    const parts = key.split('-').map(Number);
    if (parts[0] === di) {
      deleteConfirm = { di: parts[0], ei: parts[1] };
      renderTable();
      return;
    }
  }
}

function updateDelExBtn() {
  const btn = document.getElementById('del-ex-btn');
  if (!btn) return;
  const di = activeDay;
  let hasExpanded = false;
  for (const key of expanded) {
    const parts = key.split('-').map(Number);
    if (parts[0] === di) { hasExpanded = true; break; }
  }
  btn.classList.toggle('visible', hasExpanded);
}

function render() { updateFooter(); renderTabs(); renderTable(); updateDelExBtn(); updateBackupLabel(); }

document.getElementById('fab').onclick = () => doAdd(activeDay);

document.addEventListener('click', e => {
  if (editingEx) {
    const tbl = document.getElementById('tbl');
    if (tbl && !tbl.contains(e.target)) saveInlineEdit();
  }
});

// ══════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════
function exportData() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    cfg: CFG,
    data: data,
    setsDone: setsDone,
    history: history,
    restEnabled: restEnabled,
    restDefaultDuration: restDefaultDuration
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `consistency-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  // Save last export timestamp
  localStorage.setItem('kis8_last_export', new Date().toISOString());
  updateBackupLabel();
  showToast('Backup saved!', 'ok');
}

function triggerImport() {
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const payload = JSON.parse(ev.target.result);
      // Validate basic structure
      if (!payload.data || !Array.isArray(payload.data)) throw new Error('Invalid file');
      if (!payload.cfg || !Array.isArray(payload.cfg)) throw new Error('Invalid file');
      // Restore
      CFG = payload.cfg;
      data = payload.data;
      setsDone = payload.setsDone || null;
      history = payload.history || [];
      restEnabled = payload.restEnabled || {};
      restDefaultDuration = payload.restDefaultDuration || 90;
      activeDay = 0;
      expanded.clear();
      editingEx = null;
      deleteConfirm = null;
      syncSets();
      persist();
      render();
      showToast('Data restored successfully!', 'ok');
      dismissNudge();
    } catch(err) {
      showToast('Invalid backup file', 'err');
    }
  };
  reader.readAsText(file);
}

function updateBackupLabel() {
  const el = document.getElementById('backup-last-label');
  if (!el) return;
  const ts = localStorage.getItem('kis8_last_export');
  if (!ts) { el.textContent = 'No backup yet'; return; }
  const d = new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000 / 60);
  let label;
  if (diff < 1) label = 'Just now';
  else if (diff < 60) label = `${diff}m ago`;
  else if (diff < 1440) label = `${Math.floor(diff/60)}h ago`;
  else label = `${Math.floor(diff/1440)}d ago · ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;
  el.textContent = `Last export: ${label}`;
}

function showToast(msg, type) {
  const t = document.getElementById('import-toast');
  t.textContent = msg;
  t.className = `import-toast ${type} show`;
  setTimeout(() => { t.className = `import-toast ${type}`; }, 2800);
}

function dismissNudge() {
  document.getElementById('backup-nudge')?.classList.remove('show');
}

// Show nudge when session completes (patched into saveToHistory)
const _origSaveToHistory = saveToHistory;
// We patch the nudge display directly in the done-banner render
// The nudge is shown via render → renderTable → isAllDone check
function maybeShowNudge(di) {
  if (isAllDone(di)) {
    const nudge = document.getElementById('backup-nudge');
    if (nudge) nudge.classList.add('show');
  }
}

render();
updateBackupLabel();

const manifest = {
  name: "∞",
  short_name: "KIS",
  description: "Minimalist workout tracker",
  start_url: ".",
  display: "standalone",
  background_color: "#0D110E",
  theme_color: "#0D110E",
  orientation: "portrait",
  icons: [
    { src: makeIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: makeIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};

function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx2 = c.getContext('2d');
  ctx2.fillStyle = '#0D110E';
  ctx2.fillRect(0, 0, size, size);
  ctx2.fillStyle = '#C8A96E';
  ctx2.font = `${size * 0.52}px 'Georgia', serif`;
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText('K', size / 2, size / 2);
  return c.toDataURL('image/png');
}

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestURL = URL.createObjectURL(manifestBlob);
document.getElementById('manifest-placeholder').href = manifestURL;

// NOTE: Service Worker via blob URL has limited scope support — offline mode may not work in all browsers
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'kis-v2';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline'))));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e; showInstallBanner();
});
function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:calc(100% - 44px);max-width:436px;background:#F0EDE8;color:#0A0A0A;border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.5);font-family:'Space Mono',monospace;animation:slideUp .3s cubic-bezier(.32,1,.4,1);`;
  banner.innerHTML = `<style>@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}</style><div><div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px">Install App</div><div style="font-size:9px;color:#555;letter-spacing:.04em">Add to Home Screen</div></div><div style="display:flex;gap:8px;flex-shrink:0"><button onclick="dismissInstall()" style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;background:rgba(0,0,0,.08);border:none;border-radius:4px;padding:8px 12px;cursor:pointer;text-transform:uppercase;color:#555">Later</button><button onclick="doInstall()" style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;background:#0A0A0A;color:#F0EDE8;border:none;border-radius:4px;padding:8px 14px;cursor:pointer;text-transform:uppercase">Install</button></div>`;
  document.body.appendChild(banner);
}
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
}
function dismissInstall() { const b = document.getElementById('install-banner'); if (b) b.remove(); }
window.addEventListener('appinstalled', () => dismissInstall());
</script>
